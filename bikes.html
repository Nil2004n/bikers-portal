<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Machines · Bikers Portal</title>
  <link rel="icon" href="/assets/logo.svg" type="image/svg+xml" />
  <script src="./js/app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./assets/style.css" />
</head>
<body class="min-h-screen bg-ink-900 text-bone font-sans antialiased">

  <script type="module" src="./js/auth-guard.js"></script>

  <header id="bp-navbar" data-active="bikes"></header>

  <main class="max-w-6xl mx-auto px-4 md:px-6 py-8 md:py-12">
    <!-- Header -->
    <div class="flex items-end justify-between gap-4 flex-wrap">
      <div>
        <p class="bp-section-label">The Garage</p>
        <h1 class="font-serif text-[28px] md:text-[34px] text-bone mt-2">Machines worth remembering.</h1>
        <p class="text-bone-muted text-[14px] mt-2 max-w-xl">A quiet registry of the motorcycles that carry us — kept by the riders who love them.</p>
      </div>
      <button id="addBtn" class="bp-btn bp-btn-primary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        <span>Add a machine</span>
      </button>
    </div>

    <!-- Form panel (hidden by default) -->
    <section id="formPanel" class="hidden mt-7">
      <form id="bikeForm" class="bp-card p-5 md:p-6 bp-stitched" novalidate>
        <div class="flex items-center justify-between mb-5">
          <p class="bp-section-label" style="justify-content:flex-start" id="formTitle">A New Entry</p>
          <button type="button" id="formClose" class="bp-btn-subtle">Close</button>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
          <div><label class="bp-label">Make</label><input name="make" required class="bp-input" placeholder="Royal Enfield" /><p class="bp-msg bp-msg-error hidden" data-err="make"></p></div>
          <div><label class="bp-label">Model</label><input name="model" required class="bp-input" placeholder="Classic 350" /><p class="bp-msg bp-msg-error hidden" data-err="model"></p></div>
          <div><label class="bp-label">Year</label><input name="year" type="number" min="1900" max="2099" class="bp-input" placeholder="2021" /><p class="bp-msg bp-msg-error hidden" data-err="year"></p></div>
          <div><label class="bp-label">Engine (cc)</label><input name="engine_cc" type="number" min="0" class="bp-input" placeholder="349" /></div>
          <div><label class="bp-label">Color</label><input name="color" class="bp-input" placeholder="Chrome Bronze" /></div>
          <div><label class="bp-label">Photograph</label><input name="photo" type="file" accept="image/*" class="bp-input" style="padding:7px" /><p class="bp-msg bp-msg-muted">Optional, under 4 MB.</p><p class="bp-msg bp-msg-error hidden" data-err="photo"></p></div>
        </div>
        <div class="mt-4"><label class="bp-label">Description</label><textarea name="description" rows="3" class="bp-textarea" placeholder="A few words about the machine — its character, its story."></textarea></div>
        <p id="formErr" class="bp-msg bp-msg-error hidden mt-3"></p>
        <div class="flex justify-end gap-2 mt-5">
          <button type="button" id="formCancel" class="bp-btn bp-btn-ghost">Cancel</button>
          <button type="submit" id="formSubmit" class="bp-btn bp-btn-primary"><span class="btn-label">Save machine</span></button>
        </div>
      </form>
    </section>

    <!-- Filters -->
    <section class="mt-8 mb-6 bp-card p-4">
      <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
        <div>
          <label class="bp-label">Make</label>
          <select id="fMake" class="bp-select"><option value="">All makes</option></select>
        </div>
        <div>
          <label class="bp-label">Year — from</label>
          <select id="fYearFrom" class="bp-select"><option value="">Any</option></select>
        </div>
        <div>
          <label class="bp-label">Engine — min cc</label>
          <select id="fCc" class="bp-select"><option value="">Any</option></select>
        </div>
        <div class="flex items-end">
          <button id="fReset" class="bp-btn bp-btn-ghost w-full">Reset filters</button>
        </div>
      </div>
    </section>

    <!-- Grid -->
    <section id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5"></section>
    <section id="gridSkeleton" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
      <div class="bp-card overflow-hidden"><div class="skeleton h-52"></div><div class="p-4 space-y-2"><div class="skeleton h-3 w-2/3"></div><div class="skeleton h-3 w-1/2"></div></div></div>
      <div class="bp-card overflow-hidden"><div class="skeleton h-52"></div><div class="p-4 space-y-2"><div class="skeleton h-3 w-1/2"></div><div class="skeleton h-3 w-2/3"></div></div></div>
      <div class="bp-card overflow-hidden"><div class="skeleton h-52"></div><div class="p-4 space-y-2"><div class="skeleton h-3 w-3/4"></div><div class="skeleton h-3 w-1/2"></div></div></div>
    </section>
    <section id="empty" class="hidden bp-card p-12 text-center">
      <p class="font-serif text-[20px] text-bone">No machines entered yet.</p>
      <p class="text-bone-muted text-[13px] mt-2">Add the first machine to the registry.</p>
    </section>
  </main>

  <script type="module">
    import { supabase } from './js/supabase.js'
    const { esc, timeAgo, avatarHTML, toast } = window.bp
    const confirmModal = window.bp.confirm

    const me = window.__bpUser
    const state = { bikes: [], editingId: null }

    const grid     = document.getElementById('grid')
    const gridSk   = document.getElementById('gridSkeleton')
    const empty    = document.getElementById('empty')
    const form     = document.getElementById('bikeForm')
    const formPan  = document.getElementById('formPanel')
    const formTitle= document.getElementById('formTitle')
    const formErr  = document.getElementById('formErr')
    const submit   = document.getElementById('formSubmit')
    const addBtn   = document.getElementById('addBtn')

    /* ── Load + render ──────────────────────────────────── */
    async function load() {
      const { data, error } = await supabase.from('bikes')
        .select('id, user_id, make, model, year, engine_cc, color, description, photo_url, created_at, profiles(username, full_name, avatar_url)')
        .order('created_at', { ascending: false })
      if (error) { gridSk.classList.add('hidden'); grid.innerHTML = `<div class="bp-card p-6 text-bone-muted text-[13px]">Couldn’t load the registry.</div>`; return }
      state.bikes = data || []
      gridSk.classList.add('hidden')
      populateFilters()
      render()
    }
    function render() {
      const filtered = applyFilters(state.bikes)
      if (!filtered.length) { empty.classList.remove('hidden'); grid.innerHTML = ''; return }
      empty.classList.add('hidden')
      grid.innerHTML = filtered.map(cardHTML).join('')
    }
    function cardHTML(b) {
      const prof = b.profiles || {}
      const mine = b.user_id === me.id
      return `
        <article class="bp-card overflow-hidden flex flex-col" data-bike="${esc(b.id)}">
          <div class="relative bg-ink-700 border-b border-bronze">
            ${b.photo_url
              ? `<img src="${esc(b.photo_url)}" alt="" class="w-full h-56 object-cover" loading="lazy" />`
              : `<div class="w-full h-56 flex items-center justify-center text-bone-dim"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.5"><circle cx="6" cy="17" r="3"/><circle cx="18" cy="17" r="3"/><path d="M9 17h6l2-7H7l-1 4M5 10h14"/></svg></div>`}
            ${mine ? `<span class="absolute top-2 left-2 bp-badge" style="color:#c9a875;border-color:rgba(201,168,117,0.4);background:rgba(12,11,9,0.7)">Mine</span>` : ''}
          </div>
          <div class="p-4 flex-1 flex flex-col">
            <p class="font-serif text-bone text-[17px] leading-tight">${esc(b.make)} ${esc(b.model)}</p>
            <p class="text-bone-dim text-[12px] tracking-[0.12em] mt-0.5">${b.year || '—'}${b.engine_cc ? ' · ' + b.engine_cc + ' cc' : ''}${b.color ? ' · ' + esc(b.color) : ''}</p>
            ${b.description ? `<p class="text-bone-muted text-[13px] mt-3 leading-relaxed line-clamp-3">${esc(b.description)}</p>` : ''}
            <div class="mt-auto pt-4 flex items-center justify-between">
              <div class="flex items-center gap-2 min-w-0">
                ${avatarHTML(prof.avatar_url, prof.full_name || prof.username, 24)}
                <span class="text-bone-dim text-[12px] truncate">${esc(prof.full_name || prof.username || 'Rider')}</span>
              </div>
              ${mine ? `<div class="flex items-center gap-1">
                <button data-act="edit"   class="bp-btn-subtle">Edit</button>
                <button data-act="delete" class="bp-btn-subtle text-burgundy">Delete</button>
              </div>` : ''}
            </div>
          </div>
        </article>`
    }
    function applyFilters(list) {
      const mk = document.getElementById('fMake').value
      const yr = parseInt(document.getElementById('fYearFrom').value, 10)
      const cc = parseInt(document.getElementById('fCc').value, 10)
      return list.filter(b => {
        if (mk && b.make !== mk) return false
        if (!isNaN(yr) && (!b.year || b.year < yr)) return false
        if (!isNaN(cc) && (!b.engine_cc || b.engine_cc < cc)) return false
        return true
      })
    }
    function populateFilters() {
      const makes = [...new Set(state.bikes.map(b => b.make).filter(Boolean))].sort()
      const sel = document.getElementById('fMake')
      const cur = sel.value
      sel.innerHTML = `<option value="">All makes</option>` + makes.map(m => `<option ${m === cur ? 'selected' : ''}>${esc(m)}</option>`).join('')
      const years = [...new Set(state.bikes.map(b => b.year).filter(Boolean))].sort((a,b) => a-b)
      const ysel = document.getElementById('fYearFrom')
      ysel.innerHTML = `<option value="">Any</option>` + years.map(y => `<option value="${y}">${y} & up</option>`).join('')
      const ccs = [...new Set(state.bikes.map(b => b.engine_cc).filter(Boolean))].sort((a,b) => a-b)
      const csel = document.getElementById('fCc')
      csel.innerHTML = `<option value="">Any</option>` + ccs.map(c => `<option value="${c}">${c} cc & up</option>`).join('')
    }
    document.getElementById('fMake').addEventListener('change', render)
    document.getElementById('fYearFrom').addEventListener('change', render)
    document.getElementById('fCc').addEventListener('change', render)
    document.getElementById('fReset').addEventListener('click', () => {
      ['fMake','fYearFrom','fCc'].forEach(id => document.getElementById(id).value = '')
      render()
    })

    /* ── Form open/close/add/edit ───────────────────────── */
    addBtn.addEventListener('click', () => openForm(null))
    document.getElementById('formClose').addEventListener('click', closeForm)
    document.getElementById('formCancel').addEventListener('click', closeForm)
    function openForm(b) {
      formErr.classList.add('hidden')
      form.querySelectorAll('[data-err]').forEach(e => e.classList.add('hidden'))
      state.editingId = b ? b.id : null
      formTitle.textContent = b ? 'Edit Machine' : 'A New Entry'
      submit.querySelector('.btn-label').textContent = b ? 'Save changes' : 'Save machine'
      form.reset()
      if (b) {
        form.make.value = b.make || ''
        form.model.value = b.model || ''
        form.year.value = b.year || ''
        form.engine_cc.value = b.engine_cc || ''
        form.color.value = b.color || ''
        form.description.value = b.description || ''
      }
      formPan.classList.remove('hidden')
      formPan.scrollIntoView({ behavior: 'smooth', block: 'start' })
    }
    function closeForm() { formPan.classList.add('hidden'); state.editingId = null }

    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      formErr.classList.add('hidden')
      form.querySelectorAll('[data-err]').forEach(el => el.classList.add('hidden'))
      const fd = new FormData(form)
      const make  = (fd.get('make')  || '').toString().trim()
      const model = (fd.get('model') || '').toString().trim()
      const year  = parseInt(fd.get('year'), 10) || null
      const cc    = parseInt(fd.get('engine_cc'), 10) || null
      const color = (fd.get('color') || '').toString().trim()
      const desc  = (fd.get('description') || '').toString().trim()
      const photo = fd.get('photo')
      let bad = false
      if (!make)  { const el=form.querySelector('[data-err=make]');  el.textContent='Make is required.'; el.classList.remove('hidden'); bad=true }
      if (!model) { const el=form.querySelector('[data-err=model]'); el.textContent='Model is required.'; el.classList.remove('hidden'); bad=true }
      if (year && (year < 1900 || year > 2099)) { const el=form.querySelector('[data-err=year]'); el.textContent='Enter a sensible year.'; el.classList.remove('hidden'); bad=true }
      if (photo && photo.size && photo.size > 4*1024*1024) { const el=form.querySelector('[data-err=photo]'); el.textContent='Photo must be under 4 MB.'; el.classList.remove('hidden'); bad=true }
      if (bad) return

      submit.disabled = true
      submit.innerHTML = '<span class="spinner"></span><span class="btn-label">' + (state.editingId ? 'Saving' : 'Saving') + '</span>'
      try {
        let photo_url = null
        if (photo && photo.size) {
          const ext = (photo.type.split('/')[1] || 'jpg').replace('jpeg','jpg')
          const path = `${me.id}/${Date.now()}-${(photo.name || 'photo').replace(/[^a-z0-9.]/gi,'_')}.${ext}`
          const { error: upErr } = await supabase.storage.from('bike-images').upload(path, photo, { upsert: false, contentType: photo.type })
          if (upErr) throw upErr
          const { data: pub } = supabase.storage.from('bike-images').getPublicUrl(path)
          photo_url = pub.publicUrl
        }
        if (state.editingId) {
          const payload = { make, model, year, engine_cc: cc, color, description: desc }
          if (photo_url) payload.photo_url = photo_url
          const { error } = await supabase.from('bikes').update(payload).eq('id', state.editingId).eq('user_id', me.id)
          if (error) throw error
        } else {
          const { error } = await supabase.from('bikes').insert({
            user_id: me.id, make, model, year, engine_cc: cc, color, description: desc, photo_url,
          })
          if (error) throw error
        }
        toast(state.editingId ? 'Machine updated.' : 'Machine added to the registry.', 'success')
        closeForm()
        await load()
      } catch (err) {
        formErr.textContent = (err && err.message) || 'Couldn’t save. Try again.'
        formErr.classList.remove('hidden')
      } finally {
        submit.disabled = false
        submit.innerHTML = '<span class="btn-label">' + (state.editingId ? 'Save changes' : 'Save machine') + '</span>'
      }
    })

    /* ── Grid interactions ──────────────────────────────── */
    grid.addEventListener('click', async (e) => {
      const btn = e.target.closest('button[data-act]')
      if (!btn) return
      const card = btn.closest('[data-bike]')
      if (!card) return
      const id = card.getAttribute('data-bike')
      const b = state.bikes.find(x => x.id === id)
      if (!b) return
      if (btn.getAttribute('data-act') === 'edit')   return openForm(b)
      if (btn.getAttribute('data-act') === 'delete') return onDelete(b)
    })
    async function onDelete(b) {
      const ok = await confirmModal(`Remove the ${b.make} ${b.model} from the registry?`, 'Remove machine')
      if (!ok) return
      const { error } = await supabase.from('bikes').delete().eq('id', b.id).eq('user_id', me.id)
      if (error) { toast('Couldn’t remove machine.', 'error'); return }
      toast('Machine removed.', 'success')
      await load()
    }

    load()
  </script>
</body>
</html>
