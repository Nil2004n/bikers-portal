<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Machines · Bikers Portal</title>
  <link rel="icon" href="/assets/logo.svg" type="image/svg+xml" />
  <script src="./js/app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./assets/style.css" />
</head>
<body class="bg-ink-900 text-bone">
  <div class="canvas-grain"></div>

  <script type="module" src="./js/auth-guard.js"></script>
  <header id="bp-navbar" data-active="bikes"></header>

  <main class="page" style="padding-top:32px;padding-bottom:80px">

    <!-- ░░ Header ░░ -->
    <header class="page-header" style="padding:24px 0 32px;display:grid;grid-template-columns:1fr;gap:24px">
      <div class="row row-between" style="align-items:flex-end;flex-wrap:wrap;gap:16px">
        <div style="max-width:60ch">
          <p class="eyebrow brass" style="margin-bottom:14px">The garage</p>
          <h1>Machines worth remembering.</h1>
          <p class="lede">A quiet registry of the motorcycles that carry us — kept by the riders who love them.</p>
        </div>
        <button id="addBtn" class="btn btn-primary">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          <span>Add a machine</span>
        </button>
      </div>
    </header>

    <!-- ░░ Form panel (hidden) ░░ -->
    <section id="formPanel" class="hidden mb-7">
      <form id="bikeForm" class="card card-body card-stitched" novalidate>
        <div class="row row-between mb-6" style="align-items:center">
          <p class="eyebrow brass" id="formTitle">A new entry</p>
          <button type="button" id="formClose" class="btn-subtle">Close</button>
        </div>

        <div class="grid-3">
          <div class="field">
            <label class="field-label">Make</label>
            <input name="make" required class="input" placeholder="Royal Enfield" />
            <p class="field-error hidden" data-err="make"></p>
          </div>
          <div class="field">
            <label class="field-label">Model</label>
            <input name="model" required class="input" placeholder="Classic 350" />
            <p class="field-error hidden" data-err="model"></p>
          </div>
          <div class="field">
            <label class="field-label">Year</label>
            <input name="year" type="number" min="1900" max="2099" class="input" placeholder="2021" />
            <p class="field-error hidden" data-err="year"></p>
          </div>
          <div class="field">
            <label class="field-label">Engine (cc)</label>
            <input name="engine_cc" type="number" min="0" class="input" placeholder="349" />
          </div>
          <div class="field">
            <label class="field-label">Colour</label>
            <input name="color" class="input" placeholder="Chrome Bronze" />
          </div>
          <div class="field">
            <label class="field-label">Photograph</label>
            <input name="photo" type="file" accept="image/*" class="input-file" />
            <p class="field-hint">Optional, under 4 MB.</p>
            <p class="field-error hidden" data-err="photo"></p>
          </div>
        </div>

        <div class="field mt-5">
          <label class="field-label">Description</label>
          <textarea name="description" rows="3" class="textarea" placeholder="A few words about the machine — its character, its story."></textarea>
        </div>

        <p id="formErr" class="msg msg-error hidden mt-4"></p>

        <div class="row row-end gap-3 mt-6">
          <button type="button" id="formCancel" class="btn btn-ghost">Cancel</button>
          <button type="submit" id="formSubmit" class="btn btn-primary"><span class="btn-label">Save machine</span></button>
        </div>
      </form>
    </section>

    <!-- ░░ Filters ░░ -->
    <section class="card card-body-tight mb-7" style="padding:18px 22px">
      <div class="grid-filters">
        <div class="field" style="margin:0">
          <label class="field-label">Make</label>
          <select id="fMake" class="select"><option value="">All makes</option></select>
        </div>
        <div class="field" style="margin:0">
          <label class="field-label">Year — from</label>
          <select id="fYearFrom" class="select"><option value="">Any</option></select>
        </div>
        <div class="field" style="margin:0">
          <label class="field-label">Engine — min cc</label>
          <select id="fCc" class="select"><option value="">Any</option></select>
        </div>
        <div style="display:flex;align-items:flex-end">
          <button id="fReset" class="btn btn-ghost full">Reset filters</button>
        </div>
      </div>
    </section>

    <!-- ░░ Grid ░░ -->
    <section id="grid" class="grid-machines"></section>

    <section id="gridSkeleton" class="grid-machines">
      <article class="machine-card"><div class="machine-card-img"><div class="skeleton" style="width:100%;height:100%"></div></div><div class="machine-card-body"><div class="skeleton" style="height:18px;width:60%"></div><div class="skeleton" style="height:12px;width:40%"></div><div class="skeleton" style="height:36px"></div></div></article>
      <article class="machine-card"><div class="machine-card-img"><div class="skeleton" style="width:100%;height:100%"></div></div><div class="machine-card-body"><div class="skeleton" style="height:18px;width:50%"></div><div class="skeleton" style="height:12px;width:65%"></div></div></article>
      <article class="machine-card"><div class="machine-card-img"><div class="skeleton" style="width:100%;height:100%"></div></div><div class="machine-card-body"><div class="skeleton" style="height:18px;width:75%"></div><div class="skeleton" style="height:12px;width:50%"></div></div></article>
    </section>

    <section id="empty" class="hidden card card-body-loose empty-state">
      <p class="empty-title">The garage is empty.</p>
      <p class="empty-body">Add the first machine to the registry — or wait for a brother to leave a mark.</p>
    </section>
  </main>

  <style>
    .grid-machines {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }
    @media (min-width: 640px) { .grid-machines { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 1024px) { .grid-machines { grid-template-columns: repeat(3, 1fr); gap: 24px; } }
    .grid-3 {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }
    @media (min-width: 700px) { .grid-3 { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 1000px) { .grid-3 { grid-template-columns: repeat(3, 1fr); } }
    .grid-filters {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    @media (min-width: 800px) { .grid-filters { grid-template-columns: 2fr 1fr 1fr 1fr; } }
  </style>

  <script type="module">
    import { supabase } from './js/supabase.js'
    const { esc, timeAgo, avatarHTML, toast } = window.bp
    const confirmModal = window.bp.confirm

    const me = window.__bpUser
    const state = { bikes: [], editingId: null }

    const grid     = document.getElementById('grid')
    const gridSk   = document.getElementById('gridSkeleton')
    const empty    = document.getElementById('empty')
    const form     = document.getElementById('bikeForm')
    const formPan  = document.getElementById('formPanel')
    const formTitle= document.getElementById('formTitle')
    const formErr  = document.getElementById('formErr')
    const submit   = document.getElementById('formSubmit')
    const addBtn   = document.getElementById('addBtn')

    async function load() {
      const { data, error } = await supabase.from('bikes')
        .select('id, user_id, make, model, year, engine_cc, color, description, photo_url, created_at, profiles(username, full_name, avatar_url)')
        .order('created_at', { ascending: false })
      if (error) { gridSk.classList.add('hidden'); grid.innerHTML = `<div class="card card-body">Couldn’t load the registry.</div>`; return }
      state.bikes = data || []
      gridSk.classList.add('hidden')
      populateFilters()
      render()
    }
    function render() {
      const filtered = applyFilters(state.bikes)
      if (!filtered.length) { empty.classList.remove('hidden'); grid.innerHTML = ''; return }
      empty.classList.add('hidden')
      grid.innerHTML = filtered.map(cardHTML).join('')
    }
    function cardHTML(b) {
      const prof = b.profiles || {}
      const mine = b.user_id === me.id
      const meta = [b.year, b.engine_cc ? b.engine_cc + ' cc' : null, b.color].filter(Boolean).join(' · ')
      return `
        <article class="machine-card fade-up" data-bike="${esc(b.id)}">
          <div class="machine-card-img">
            ${b.photo_url
              ? `<img src="${esc(b.photo_url)}" alt="" loading="lazy" />`
              : `<div class="machine-card-img-placeholder"><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.45"><circle cx="6" cy="17" r="3"/><circle cx="18" cy="17" r="3"/><path d="M9 17h6l2-7H7l-1 4M5 10h14"/></svg></div>`}
            ${mine ? `<span class="badge badge-brass" style="position:absolute;top:12px;left:12px">Mine</span>` : ''}
          </div>
          <div class="machine-card-body">
            <p class="machine-card-title">${esc(b.make)} ${esc(b.model)}</p>
            <p class="machine-card-meta">${esc(meta || '—')}</p>
            ${b.description ? `<p class="machine-card-desc line-clamp-3">${esc(b.description)}</p>` : ''}
            <div class="machine-card-foot">
              <div class="row row-2 min-w-0" style="align-items:center;flex:1">
                ${avatarHTML(prof.avatar_url, prof.full_name || prof.username, 24)}
                <span class="truncate" style="font-size:12px;color:var(--c-text-3)">${esc(prof.full_name || prof.username || 'Rider')}</span>
              </div>
              ${mine ? `<div class="row row-1">
                <button data-act="edit"   class="btn-subtle">Edit</button>
                <button data-act="delete" class="btn-subtle" style="color:var(--c-error)">Delete</button>
              </div>` : ''}
            </div>
          </div>
        </article>`
    }
    function applyFilters(list) {
      const mk = document.getElementById('fMake').value
      const yr = parseInt(document.getElementById('fYearFrom').value, 10)
      const cc = parseInt(document.getElementById('fCc').value, 10)
      return list.filter(b => {
        if (mk && b.make !== mk) return false
        if (!isNaN(yr) && (!b.year || b.year < yr)) return false
        if (!isNaN(cc) && (!b.engine_cc || b.engine_cc < cc)) return false
        return true
      })
    }
    function populateFilters() {
      const makes = [...new Set(state.bikes.map(b => b.make).filter(Boolean))].sort()
      const sel = document.getElementById('fMake')
      const cur = sel.value
      sel.innerHTML = `<option value="">All makes</option>` + makes.map(m => `<option ${m === cur ? 'selected' : ''}>${esc(m)}</option>`).join('')
      const years = [...new Set(state.bikes.map(b => b.year).filter(Boolean))].sort((a,b) => a-b)
      const ysel = document.getElementById('fYearFrom')
      ysel.innerHTML = `<option value="">Any</option>` + years.map(y => `<option value="${y}">${y} & up</option>`).join('')
      const ccs = [...new Set(state.bikes.map(b => b.engine_cc).filter(Boolean))].sort((a,b) => a-b)
      const csel = document.getElementById('fCc')
      csel.innerHTML = `<option value="">Any</option>` + ccs.map(c => `<option value="${c}">${c} cc & up</option>`).join('')
    }
    document.getElementById('fMake').addEventListener('change', render)
    document.getElementById('fYearFrom').addEventListener('change', render)
    document.getElementById('fCc').addEventListener('change', render)
    document.getElementById('fReset').addEventListener('click', () => {
      ['fMake','fYearFrom','fCc'].forEach(id => document.getElementById(id).value = '')
      render()
    })

    addBtn.addEventListener('click', () => openForm(null))
    document.getElementById('formClose').addEventListener('click', closeForm)
    document.getElementById('formCancel').addEventListener('click', closeForm)
    function openForm(b) {
      formErr.classList.add('hidden')
      form.querySelectorAll('[data-err]').forEach(e => e.classList.add('hidden'))
      state.editingId = b ? b.id : null
      formTitle.textContent = b ? 'Edit machine' : 'A new entry'
      submit.querySelector('.btn-label').textContent = b ? 'Save changes' : 'Save machine'
      form.reset()
      if (b) {
        form.make.value = b.make || ''
        form.model.value = b.model || ''
        form.year.value = b.year || ''
        form.engine_cc.value = b.engine_cc || ''
        form.color.value = b.color || ''
        form.description.value = b.description || ''
      }
      formPan.classList.remove('hidden')
      formPan.classList.add('fade-up')
      formPan.scrollIntoView({ behavior: 'smooth', block: 'start' })
    }
    function closeForm() { formPan.classList.add('hidden'); state.editingId = null }

    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      formErr.classList.add('hidden')
      form.querySelectorAll('[data-err]').forEach(el => el.classList.add('hidden'))
      const fd = new FormData(form)
      const make  = (fd.get('make')  || '').toString().trim()
      const model = (fd.get('model') || '').toString().trim()
      const year  = parseInt(fd.get('year'), 10) || null
      const cc    = parseInt(fd.get('engine_cc'), 10) || null
      const color = (fd.get('color') || '').toString().trim()
      const desc  = (fd.get('description') || '').toString().trim()
      const photo = fd.get('photo')
      let bad = false
      if (!make)  { const el=form.querySelector('[data-err=make]');  el.textContent='Make is required.'; el.classList.remove('hidden'); bad=true }
      if (!model) { const el=form.querySelector('[data-err=model]'); el.textContent='Model is required.'; el.classList.remove('hidden'); bad=true }
      if (year && (year < 1900 || year > 2099)) { const el=form.querySelector('[data-err=year]'); el.textContent='Enter a sensible year.'; el.classList.remove('hidden'); bad=true }
      if (photo && photo.size && photo.size > 4*1024*1024) { const el=form.querySelector('[data-err=photo]'); el.textContent='Photo must be under 4 MB.'; el.classList.remove('hidden'); bad=true }
      if (bad) return

      submit.disabled = true
      submit.innerHTML = '<span class="spinner"></span><span class="btn-label">Saving</span>'
      try {
        let photo_url = null
        if (photo && photo.size) {
          const ext = (photo.type.split('/')[1] || 'jpg').replace('jpeg','jpg')
          const path = `${me.id}/${Date.now()}-${(photo.name || 'photo').replace(/[^a-z0-9.]/gi,'_')}.${ext}`
          const { error: upErr } = await supabase.storage.from('bike-images').upload(path, photo, { upsert: false, contentType: photo.type })
          if (upErr) throw upErr
          const { data: pub } = supabase.storage.from('bike-images').getPublicUrl(path)
          photo_url = pub.publicUrl
        }
        if (state.editingId) {
          const payload = { make, model, year, engine_cc: cc, color, description: desc }
          if (photo_url) payload.photo_url = photo_url
          const { error } = await supabase.from('bikes').update(payload).eq('id', state.editingId).eq('user_id', me.id)
          if (error) throw error
        } else {
          const { error } = await supabase.from('bikes').insert({
            user_id: me.id, make, model, year, engine_cc: cc, color, description: desc, photo_url,
          })
          if (error) throw error
        }
        toast(state.editingId ? 'Machine updated.' : 'Machine added to the registry.', 'success')
        closeForm()
        await load()
      } catch (err) {
        formErr.textContent = (err && err.message) || 'Couldn’t save. Try again.'
        formErr.classList.remove('hidden')
      } finally {
        submit.disabled = false
        submit.innerHTML = '<span class="btn-label">' + (state.editingId ? 'Save changes' : 'Save machine') + '</span>'
      }
    })

    grid.addEventListener('click', async (e) => {
      const btn = e.target.closest('button[data-act]')
      if (!btn) return
      const card = btn.closest('[data-bike]')
      if (!card) return
      const id = card.getAttribute('data-bike')
      const b = state.bikes.find(x => x.id === id)
      if (!b) return
      if (btn.getAttribute('data-act') === 'edit')   return openForm(b)
      if (btn.getAttribute('data-act') === 'delete') return onDelete(b)
    })
    async function onDelete(b) {
      const ok = await confirmModal(`Remove the ${b.make} ${b.model} from the registry?`, 'Remove machine')
      if (!ok) return
      const { error } = await supabase.from('bikes').delete().eq('id', b.id).eq('user_id', me.id)
      if (error) { toast('Couldn’t remove machine.', 'error'); return }
      toast('Machine removed.', 'success')
      await load()
    }

    load()
  </script>
</body>
</html>
