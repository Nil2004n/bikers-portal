<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Outer compass ring -->
  <circle cx="20" cy="20" r="17" stroke="currentColor" stroke-width="1" opacity="0.4"/>
  <circle cx="20" cy="20" r="14" stroke="currentColor" stroke-width="1.2"/>
  <!-- Tick marks at N E S W -->
  <line x1="20" y1="2" x2="20" y2="6" stroke="currentColor" stroke-width="1.5"/>
  <line x1="34" y1="20" x2="38" y2="20" stroke="currentColor" stroke-width="1.5"/>
  <line x1="20" y1="34" x2="20" y2="38" stroke="currentColor" stroke-width="1.5"/>
  <line x1="2" y1="20" x2="6" y2="20" stroke="currentColor" stroke-width="1.5"/>
  <!-- Cardinal letters -->
  <text x="20" y="3.6" text-anchor="middle" fill="currentColor" font-family="JetBrains Mono, monospace" font-size="3" font-weight="700">N</text>
  <text x="36.6" y="21.4" text-anchor="middle" fill="currentColor" font-family="JetBrains Mono, monospace" font-size="3" font-weight="700">E</text>
  <text x="20" y="39" text-anchor="middle" fill="currentColor" font-family="JetBrains Mono, monospace" font-size="3" font-weight="700">S</text>
  <text x="3.4" y="21.4" text-anchor="middle" fill="currentColor" font-family="JetBrains Mono, monospace" font-size="3" font-weight="700">W</text>
  <!-- The "B" — built from two angular bowls -->
  <path d="M 12 11 L 12 29 M 12 11 L 19 11 C 22 11 22 14 19 14 L 12 14 M 12 14 L 19.5 14 C 23 14 23 18 19.5 18 L 12 18 M 12 18 L 19 18 C 23 18 23 22 19 22 L 12 22" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter" fill="none"/>
  <!-- Compass needle pointing N (brass accent) -->
  <path d="M 20 9 L 22 20 L 20 18 L 18 20 Z" fill="#c9a84c"/>
  <path d="M 20 18 L 22 20 L 20 31 L 18 20 Z" fill="currentColor" opacity="0.4"/>
  <!-- Center pivot -->
  <circle cx="20" cy="20" r="1.2" fill="#c9a84c"/>
</svg>
