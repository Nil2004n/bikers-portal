<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 156 36" fill="none" aria-label="Bikers Portal" role="img">
  <!-- heritage crest -->
  <g transform="translate(2,2)">
    <path d="M16 1 L30 7 L30 22 L16 33 L2 22 L2 7 Z" stroke="#b08d57" stroke-width="1.1" fill="#15130f"/>
    <path d="M16 4 L27 8.5 L27 21 L16 30 L5 21 L5 8.5 Z" stroke="#3a3129" stroke-width="0.5" fill="none"/>
    <text x="16" y="21" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="12.5" font-weight="600" fill="#f3ede3" letter-spacing="0.6">BP</text>
    <line x1="11" y1="25.5" x2="21" y2="25.5" stroke="#b08d57" stroke-width="0.5"/>
  </g>
  <!-- wordmark -->
  <text x="44" y="17" font-family="Fraunces, Georgia, serif" font-size="13" font-weight="600" fill="#f3ede3" letter-spacing="2.6">BIKERS</text>
  <text x="44" y="29" font-family="Satoshi, Inter, sans-serif" font-size="7.2" font-weight="500" fill="#c7b9a2" letter-spacing="4.4">PORTAL</text>
  <!-- engraved divider -->
  <line x1="44" y1="20" x2="150" y2="20" stroke="#3a3129" stroke-width="0.6"/>
  <circle cx="150" cy="20" r="1.2" fill="#b08d57"/>
</svg>
