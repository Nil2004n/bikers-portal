<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" aria-label="Bikers Portal — Road Society">
  <defs>
    <linearGradient id="brass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c89e69"/>
      <stop offset="50%" stop-color="#b08d57"/>
      <stop offset="100%" stop-color="#8a6a3d"/>
    </linearGradient>
  </defs>

  <!-- Outer brass ring -->
  <circle cx="30" cy="30" r="25" fill="none" stroke="url(#brass)" stroke-width="1.2"/>
  <!-- Inner hairline ring -->
  <circle cx="30" cy="30" r="20.5" fill="none" stroke="#b08d57" stroke-width="0.4" opacity="0.55"/>

  <!-- Horizontal road line -->
  <line x1="6" y1="30" x2="54" y2="30" stroke="#b08d57" stroke-width="0.5" opacity="0.45"/>

  <!-- Stylised handlebar curve (upper) -->
  <path d="M17 26 Q23.5 16.5, 30 16.5 Q36.5 16.5, 43 26"
        stroke="url(#brass)" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <!-- Stylised tank curve (lower) -->
  <path d="M17 34 Q23.5 43.5, 30 43.5 Q36.5 43.5, 43 34"
        stroke="url(#brass)" stroke-width="1.6" fill="none" stroke-linecap="round"/>

  <!-- Central spine -->
  <line x1="30" y1="16.5" x2="30" y2="43.5" stroke="#b08d57" stroke-width="0.6" opacity="0.55"/>

  <!-- Center stud -->
  <circle cx="30" cy="30" r="1.6" fill="#b08d57"/>

  <!-- Wordmark -->
  <text x="70" y="28"
        font-family="'Cormorant Garamond', 'Playfair Display', Georgia, serif"
        font-size="24" font-weight="600" fill="#f3ede3" letter-spacing="3.5">BIKERS</text>
  <text x="70" y="44"
        font-family="'Satoshi', 'Inter', sans-serif"
        font-size="7.5" font-weight="500" fill="#b08d57" letter-spacing="5">PORTAL  ·  EST. MMXXVI</text>
</svg>
