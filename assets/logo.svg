<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-label="Bikers Portal" role="img">
  <!-- outer rim -->
  <circle cx="24" cy="24" r="22" stroke-width="1.6"/>
  <!-- inner ring -->
  <circle cx="24" cy="24" r="18.4" stroke-width="0.5" stroke-opacity="0.45"/>
  <!-- spoke cross -->
  <g stroke-width="0.9" stroke-opacity="0.45">
    <line x1="24" y1="5.6" x2="24" y2="42.4"/>
    <line x1="5.6" y1="24" x2="42.4" y2="24"/>
    <line x1="10.6" y1="10.6" x2="37.4" y2="37.4"/>
    <line x1="37.4" y1="10.6" x2="10.6" y2="37.4"/>
  </g>
  <!-- hub disc (holds the monogram) -->
  <circle cx="24" cy="24" r="9" stroke-width="1.1"/>
  <circle cx="24" cy="24" r="9" stroke-width="0.4" stroke-opacity="0.5"/>
  <!-- BP monogram -->
  <g fill="currentColor" stroke="none" font-family="Cormorant Garamond, Georgia, serif" font-weight="600">
    <text x="24" y="28.5" text-anchor="middle" font-size="12.5" letter-spacing="0.4">BP</text>
  </g>
  <!-- hairline indicators (compass) -->
  <g stroke-width="0.7" stroke-opacity="0.6">
    <line x1="24" y1="1.5" x2="24" y2="4"/>
    <line x1="24" y1="44" x2="24" y2="46.5"/>
    <line x1="1.5" y1="24" x2="4" y2="24"/>
    <line x1="44" y1="24" x2="46.5" y2="24"/>
  </g>
</svg>
