# Netlify config is kept as a reference for static hosting.
# The app now runs from the Express server in `server/index.js`.
# If you redeploy to Netlify, set this folder as the publish target and
# drop the [[functions]] / `functions = "netlify/functions"` line.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
