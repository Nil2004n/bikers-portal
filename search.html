<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The lookout · Bikers Portal</title>
  <link rel="icon" href="/assets/logo.svg" type="image/svg+xml" />
  <script src="./js/app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./assets/style.css" />
</head>
<body>
  <script type="module" src="./js/auth-guard.js"></script>
  <header id="bp-navbar" data-active=""></header>

  <!-- ░░ LOOKOUT STAGE ░░ -->
  <section class="lookout-stage">
    <div class="compass-bg">
      <svg viewBox="0 0 200 200" fill="none" stroke="currentColor" stroke-width="0.5" xmlns="http://www.w3.org/2000/svg">
        <circle cx="100" cy="100" r="90"/>
        <circle cx="100" cy="100" r="74"/>
        <path d="M 100 30 L 110 100 L 100 90 L 90 100 Z" fill="currentColor"/>
        <path d="M 100 90 L 110 100 L 100 170 L 90 100 Z" fill="currentColor" opacity="0.4"/>
      </svg>
    </div>
    <div class="page" style="padding:0;position:relative;z-index:1">
      <p class="eyebrow eyebrow-racing center">The lookout <span style="color:var(--color-text-faint);margin-left:8px">·</span> <span class="mono" style="color:var(--color-text-3);font-size:10px;letter-spacing:.2em">CH. 06</span></p>
      <h1 class="center" style="font-style:italic">Scan the <span style="color:var(--color-racing)">horizon.</span></h1>
      <p class="lede center" style="margin:8px auto 0">Find a rider, a machine, a route. The crew is out there.</p>

      <div class="search-field">
        <span class="search-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"><circle cx="11" cy="11" r="7"/><path d="M16 16l5 5"/></svg>
        </span>
        <input type="text" id="searchInput" class="input" placeholder="Name, machine, route…" autocomplete="off" />
        <button id="searchClear" type="button" class="clear hidden" aria-label="Clear">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
      </div>

      <div class="scope-tabs" id="scopeTabs">
        <button class="scope is-active" data-scope="riders" type="button"><span>Riders</span><span class="count" data-count="riders">0</span></button>
        <button class="scope" data-scope="machines" type="button"><span>Machines</span><span class="count" data-count="machines">0</span></button>
        <button class="scope" data-scope="routes" type="button"><span>Routes</span><span class="count" data-count="routes">0</span></button>
      </div>
    </div>
  </section>

  <main class="page" style="padding-top:0">
    <div id="resultsArea" class="results-area"></div>
  </main>

  <footer class="site-footer">
    Bikers Portal <span style="color:var(--color-brass);padding:0 8px">·</span> EST. MMXXIV <span style="color:var(--color-brass);padding:0 8px">·</span> Charted by riders, for riders
  </footer>

  <!-- Result templates -->
  <template id="tplRider">
    <a class="rider-card" href="">
      <div class="rider-head">
        <div class="rider-avatar avatar avatar-md"></div>
        <div class="info">
          <div class="n rider-name"></div>
          <div class="h rider-handle mono"></div>
        </div>
        <button type="button" class="follow-btn" data-act="follow">Follow</button>
      </div>
      <p class="rider-bio"></p>
    </a>
  </template>

  <template id="tplMachine">
    <a class="machine-card" href="">
      <div class="card-media" style="background:linear-gradient(135deg,var(--color-cobalt),var(--color-deep-red))">
        <img alt="" />
      </div>
      <div class="card-body">
        <span class="make mono"></span>
        <span class="model"></span>
        <div class="spec mono">
          <span class="year"></span>
          <span class="cc"></span>
        </div>
      </div>
    </a>
  </template>

  <template id="tplRoute">
    <a class="route-card" href="">
      <div class="route-art">
        <span class="bearing mono">BRG 045°</span>
        <svg viewBox="0 0 400 225" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
          <path d="M 0 130 L 60 80 L 100 110 L 140 70 L 180 100 L 220 60 L 260 95 L 300 75 L 340 105 L 400 85 L 400 225 L 0 225 Z" fill="#0b0d12" opacity="0.5"/>
          <path d="M 200 225 L 200 100" stroke="#c9a84c" stroke-width="1.5" stroke-dasharray="6 8" stroke-opacity="0.7"/>
        </svg>
      </div>
      <div class="route-body">
        <h3 class="route-title"></h3>
        <div class="route-meta mono">
          <span class="date"></span>
          <span class="dist"></span>
        </div>
      </div>
    </a>
  </template>

  <script type="module">
    import { supabase, getUnreadNotificationCount, subscribeToNotifications } from './js/supabase.js'
    import * as follow from './js/follow.js'
    import { searchRiders, searchMachines, searchTrips, debounce } from './js/search.js'

    const $ = (id) => document.getElementById(id)
    const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]))
    const initialsOf = (n) => (n || '?').split(/\s+/).map(s => s[0]).join('').slice(0, 2).toUpperCase()

    /* session */
    const { data: { session } } = await supabase.auth.getSession()
    const me = session?.user
    if (!me) { window.location.replace('/index.html'); }

    const resultsArea = $('resultsArea')
    const searchInput = $('searchInput')
    const searchClear = $('searchClear')
    const scopeTabs   = $('scopeTabs')
    const tplRider    = $('tplRider')
    const tplMachine  = $('tplMachine')
    const tplRoute    = $('tplRoute')

    let currentScope = 'riders'
    const counts = { riders: 0, machines: 0, routes: 0 }
    const cache  = { riders: [], machines: [], routes: [] }

    function setCountBadge(scope, n) {
      counts[scope] = n
      const el = scopeTabs.querySelector(`[data-count="${scope}"]`)
      if (el) el.textContent = n > 0 ? `(${n})` : ''
    }

    function emptyState() {
      resultsArea.innerHTML = `
        <div class="results-empty">
          <div class="icon">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.8" stroke-linecap="square">
              <circle cx="11" cy="11" r="7"/>
              <path d="M16 16l5 5"/>
            </svg>
          </div>
          <h3>No matches in the ${currentScope}.</h3>
          <p>Try a different name, machine, or route.</p>
        </div>`
    }

    function renderRiders(list) {
      if (!list.length) return emptyState()
      const wrap = document.createElement('div')
      wrap.className = 'grid-riders'
      list.forEach(r => {
        const node = tplRider.content.cloneNode(true)
        const card = node.querySelector('.rider-card')
        card.href = `/profile.html?u=${encodeURIComponent(r.id)}`
        const av = node.querySelector('.rider-avatar')
        av.innerHTML = r.avatar_url
          ? `<img src="${esc(r.avatar_url)}" alt="" class="avatar-img" style="width:100%;height:100%;object-fit:cover"/>`
          : `<span class="bp-avatar-fallback" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center">${esc(initialsOf(r.full_name || r.username))}</span>`
        node.querySelector('.rider-name').textContent   = r.full_name || r.username
        node.querySelector('.rider-handle').textContent = '@' + (r.username || 'rider')
        const bioEl = node.querySelector('.rider-bio')
        if (r.bio) { bioEl.textContent = r.bio } else { bioEl.remove() }
        const btn = node.querySelector('.follow-btn')
        btn.dataset.target = r.id
        follow.getFollowStatus(r.id).then(st => {
          if (st === 'accepted') { btn.dataset.state = 'following'; btn.textContent = 'Following' }
          else if (st === 'pending_sent') { btn.dataset.state = 'pending'; btn.textContent = 'Requested' }
          else { btn.dataset.state = 'none'; btn.textContent = 'Follow' }
        })
        btn.addEventListener('click', async (e) => {
          e.preventDefault(); e.stopPropagation()
          btn.disabled = true
          if (btn.dataset.state === 'none')      await follow.sendFollowRequest(r.id)
          else if (btn.dataset.state === 'pending')  await follow.cancelFollowRequest(r.id)
          else if (btn.dataset.state === 'following') await follow.unfollowUser(r.id)
          const st = await follow.getFollowStatus(r.id)
          if (st === 'accepted') { btn.dataset.state = 'following'; btn.textContent = 'Following' }
          else if (st === 'pending_sent') { btn.dataset.state = 'pending'; btn.textContent = 'Requested' }
          else { btn.dataset.state = 'none'; btn.textContent = 'Follow' }
          btn.disabled = false
        })
        wrap.appendChild(node)
      })
      resultsArea.innerHTML = ''
      resultsArea.appendChild(wrap)
    }

    function renderMachines(list) {
      if (!list.length) return emptyState()
      const wrap = document.createElement('div')
      wrap.className = 'grid-machines-search'
      list.forEach(b => {
        const node = tplMachine.content.cloneNode(true)
        const card = node.querySelector('.machine-card')
        card.href = `/profile.html?u=${encodeURIComponent(b.user_id)}`
        const media = node.querySelector('.card-media')
        if (b.photo_url) {
          media.innerHTML = `<img src="${esc(b.photo_url)}" alt=""/><div class="race-plate">B</div>`
        } else {
          media.innerHTML = `<div class="race-plate" style="left:50%;top:50%;transform:translate(-50%,-50%);width:80px;height:80px;font-size:32px">${esc((b.make || '?').charAt(0).toUpperCase())}</div>`
        }
        node.querySelector('.make').textContent  = b.make || '—'
        node.querySelector('.model').textContent = b.model || '—'
        const yEl = node.querySelector('.year'); yEl.textContent = b.year || ''
        const cEl = node.querySelector('.cc');   cEl.textContent = b.engine_cc ? b.engine_cc + ' cc' : ''
        wrap.appendChild(node)
      })
      resultsArea.innerHTML = ''
      resultsArea.appendChild(wrap)
    }

    function renderRoutes(list) {
      if (!list.length) return emptyState()
      const wrap = document.createElement('div')
      wrap.className = 'grid-trips'
      list.forEach(t => {
        const node = tplRoute.content.cloneNode(true)
        const card = node.querySelector('.route-card')
        card.href = `/trips.html`
        node.querySelector('.route-title').textContent = t.title || 'Untitled voyage'
        const dateEl = node.querySelector('.date'); dateEl.textContent = t.trip_date ? new Date(t.trip_date).toLocaleDateString() : ''
        const distEl = node.querySelector('.dist');  distEl.textContent = t.distance_km ? Math.round(t.distance_km) + ' km' : ''
        wrap.appendChild(node)
      })
      resultsArea.innerHTML = ''
      resultsArea.appendChild(wrap)
    }

    async function doSearch() {
      const q = (searchInput.value || '').trim()
      if (!q) { resultsArea.innerHTML = ''; setCountBadge('riders',0); setCountBadge('machines',0); setCountBadge('routes',0); return }

      try {
        const [riders, machines, routes] = await Promise.all([
          searchRiders(q),
          searchMachines(q),
          searchTrips(q)
        ])
        cache.riders = riders || []
        cache.machines = machines || []
        cache.routes = routes || []
        setCountBadge('riders', cache.riders.length)
        setCountBadge('machines', cache.machines.length)
        setCountBadge('routes', cache.routes.length)

        if (currentScope === 'riders')        renderRiders(cache.riders)
        else if (currentScope === 'machines') renderMachines(cache.machines)
        else                                  renderRoutes(cache.routes)
      } catch (err) {
        resultsArea.innerHTML = `<div class="results-empty"><h3>${esc(err?.message || 'Search failed.')}</h3></div>`
      }
    }

    const onInput = debounce(doSearch, 300)

    if (searchInput) {
      searchInput.addEventListener('input', () => {
        searchClear?.classList.toggle('hidden', !searchInput.value)
        onInput()
      })
    }
    if (searchClear) {
      searchClear.addEventListener('click', () => {
        searchInput.value = ''
        searchClear.classList.add('hidden')
        resultsArea.innerHTML = ''
        setCountBadge('riders',0); setCountBadge('machines',0); setCountBadge('routes',0)
        searchInput.focus()
      })
    }

    if (scopeTabs) scopeTabs.addEventListener('click', (e) => {
      const s = e.target.closest('.scope'); if (!s) return
      scopeTabs.querySelectorAll('.scope').forEach(x => x.classList.toggle('is-active', x === s))
      currentScope = s.dataset.scope
      if (currentScope === 'riders')        renderRiders(cache.riders)
      else if (currentScope === 'machines') renderMachines(cache.machines)
      else                                  renderRoutes(cache.routes)
    })

    /* auto-focus search */
    searchInput?.focus()

    // ── Nav injection: Messages + Notifications ──────────
    function injectNav() {
      const navLinks = document.querySelector('.nav-links')
      if (!navLinks || document.getElementById('nav-messages')) return

      const msgLink = document.createElement('a')
      msgLink.href = '/messages.html'
      msgLink.className = 'nav-link'
      msgLink.id = 'nav-messages'
      msgLink.innerHTML = '<span>Messages</span><span class="nav-badge" id="msg-unread-badge" style="display:none"></span>'
      navLinks.appendChild(msgLink)

      const notifLink = document.createElement('a')
      notifLink.href = '/notifications.html'
      notifLink.className = 'nav-link'
      notifLink.id = 'nav-notifications'
      notifLink.innerHTML = '<span>Notifications</span><span class="nav-badge" id="notif-unread-badge" style="display:none"></span>'
      navLinks.appendChild(notifLink)

      const mobileNav = document.querySelector('.nav-mobile nav')
      if (mobileNav) {
        const mMsg = document.createElement('a')
        mMsg.href = '/messages.html'
        mMsg.className = 'nav-link'
        mMsg.textContent = 'Messages'
        mobileNav.appendChild(mMsg)
        const mNotif = document.createElement('a')
        mNotif.href = '/notifications.html'
        mNotif.className = 'nav-link'
        mNotif.textContent = 'Notifications'
        mobileNav.appendChild(mNotif)
      }
    }

    // ── Badge loader ──────────────────────────────────────
    async function loadNavBadges() {
      const { data: { user } } = await supabase.auth.getUser()
      if (!user) return

      const notifCount = await getUnreadNotificationCount()
      const badge = document.getElementById('notif-unread-badge')
      if (badge) {
        badge.textContent = notifCount > 99 ? '99+' : notifCount
        badge.style.display = notifCount > 0 ? 'flex' : 'none'
      }

      let notifChannel = subscribeToNotifications(user.id, () => {
        const b = document.getElementById('notif-unread-badge')
        if (b) {
          const current = parseInt(b.textContent) || 0
          b.textContent = current + 1 > 99 ? '99+' : (current + 1)
          b.style.display = 'flex'
          b.style.transition = 'transform 150ms ease'
          b.style.transform = 'scale(1.3)'
          setTimeout(() => { b.style.transform = 'scale(1)' }, 150)
        }
      })

      window.addEventListener('beforeunload', () => {
        if (notifChannel) notifChannel.unsubscribe()
      })
    }

    injectNav()
    loadNavBadges()
  </script>

  <style>
    .nav-badge {
      margin-left: auto;
      background: var(--color-racing);
      color: var(--color-paper);
      font-size: 10px;
      font-weight: 700;
      font-family: var(--font-body);
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      letter-spacing: 0;
    }
  </style>
</body>
</html>
