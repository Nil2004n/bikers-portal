<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search · Bikers Portal</title>
  <link rel="icon" href="/assets/logo.svg" type="image/svg+xml" />
  <script src="./js/app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./assets/style.css" />
  <style>
    /* ── Search input ───────────────────────────────────── */
    .search-field {
      position: relative;
      max-width: 600px;
      margin: 0 auto;
    }
    .search-field .search-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--c-text-3);
      pointer-events: none;
      transition: color var(--t-fast);
    }
    .search-field input {
      width: 100%;
      height: 50px;
      padding: 0 48px 0 48px;
      background: var(--c-bg);
      border: 1px solid var(--c-border-strong);
      border-radius: var(--r-md);
      color: var(--c-text);
      font-family: var(--font-body);
      font-size: 16px;
      transition: border-color var(--t-fast), box-shadow var(--t-fast), background var(--t-fast);
    }
    .search-field input::placeholder { color: var(--c-text-3); }
    .search-field input:hover { border-color: rgba(26, 20, 9, 0.32); }
    .search-field input:focus {
      outline: none;
      border-color: var(--c-text);
      background: #fdfaf2;
      box-shadow: 0 0 0 4px rgba(26, 20, 9, 0.05);
    }
    .search-field input:focus + .search-icon { color: var(--c-text-2); }
    .search-field .search-clear {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 24px; height: 24px;
      display: inline-flex; align-items: center; justify-content: center;
      color: var(--c-text-3);
      background: transparent;
      border: 0;
      border-radius: 9999px;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--t-fast), color var(--t-fast), background var(--t-fast);
    }
    .search-field .search-clear.is-on { opacity: 1; pointer-events: auto; }
    .search-field .search-clear:hover { color: var(--c-text); background: var(--c-surface); }

    /* ── Scope tabs ─────────────────────────────────────── */
    .scope-tabs {
      display: inline-flex;
      align-items: center;
      gap: 0;
      border-bottom: 1px solid var(--c-border);
      max-width: 100%;
      overflow-x: auto;
    }
    .scope-tab {
      position: relative;
      padding: 12px 20px;
      font-family: var(--font-body);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--c-text-3);
      cursor: pointer;
      background: transparent;
      border: 0;
      border-bottom: 1.5px solid transparent;
      margin-bottom: -1px;
      font-weight: 600;
      transition: color var(--t-fast);
      white-space: nowrap;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .scope-tab:hover { color: var(--c-text); }
    .scope-tab.is-on { color: var(--c-text); border-bottom-color: var(--c-text); }
    .scope-tab .count {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 13px;
      color: var(--c-text-3);
      letter-spacing: 0.02em;
      text-transform: none;
      font-weight: 500;
    }
    .scope-tab.is-on .count { color: var(--c-text-2); }

    /* ── Results area ──────────────────────────────────── */
    .results-area { transition: opacity 150ms ease; }
    .results-area.is-fading { opacity: 0; }

    /* ── Rider result card ─────────────────────────────── */
    .rider-card { display: flex; flex-direction: column; height: 100%; }
    .rider-card-head { display: flex; align-items: flex-start; gap: 14px; }
    .rider-card-meta { flex: 1; min-width: 0; }
    .rider-card-name {
      font-family: var(--font-display);
      font-size: 18px; font-weight: 500;
      color: var(--c-text);
      line-height: 1.15;
    }
    .rider-card-handle { font-size: 11.5px; color: var(--c-text-3); margin-top: 2px; letter-spacing: 0.02em; }
    .rider-card-bike { margin-top: 8px; }
    .rider-card-bio { font-size: 13px; line-height: 1.55; color: var(--c-text-2); margin-top: 14px; }
    .rider-card-foot {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      margin-top: 18px; padding-top: 14px;
      border-top: 1px solid var(--c-border);
    }
    .rider-card-followers {
      font-family: var(--font-body);
      font-size: 12px; color: var(--c-text-3);
      letter-spacing: 0.02em;
    }

    /* Follow button micro-state animations */
    .follow-btn { transition: transform var(--t-fast); }
    .follow-btn.pop { animation: followPop 220ms cubic-bezier(0.16, 1, 0.3, 1); }
    @keyframes followPop { 0% { transform: scale(1); } 50% { transform: scale(0.95); } 100% { transform: scale(1); } }
    .follow-btn .btn-label { transition: opacity 100ms ease; }
    .follow-btn.is-swapping .btn-label { opacity: 0; }

    /* Accept/Decline row inside a card */
    .follow-actions { display: inline-flex; gap: 6px; }

    /* ── Route result card (list row) ──────────────────── */
    .route-row {
      display: flex; align-items: center; gap: 20px;
      padding: 18px 22px;
    }
    .route-row-info { flex: 1; min-width: 0; }
    .route-row-owner {
      display: inline-flex; align-items: center; gap: 8px;
      flex-shrink: 0;
      font-size: 12px; color: var(--c-text-3);
    }

    /* ── Empty + no-results typography ─────────────────── */
    .search-empty {
      text-align: center;
      padding: clamp(40px, 6vw, 72px) 24px;
    }
    .search-empty .search-empty-title {
      font-family: var(--font-display);
      font-style: italic;
      font-weight: 400;
      font-size: clamp(20px, 2.4vw, 24px);
      color: var(--c-text);
    }
    .search-empty .search-empty-body {
      color: var(--c-text-2);
      font-size: 14px;
      margin-top: 10px;
      max-width: 48ch;
      margin-left: auto; margin-right: auto;
      line-height: 1.55;
    }

    /* ── Grids ─────────────────────────────────────────── */
    .grid-riders {
      display: grid; grid-template-columns: 1fr; gap: 16px;
    }
    @media (min-width: 640px) { .grid-riders { grid-template-columns: 1fr 1fr; gap: 18px; } }
    @media (min-width: 1024px) { .grid-riders { grid-template-columns: repeat(3, 1fr); gap: 20px; } }

    .grid-machines-search {
      display: grid; grid-template-columns: 1fr; gap: 18px;
    }
    @media (min-width: 640px) { .grid-machines-search { grid-template-columns: 1fr 1fr; } }
    @media (min-width: 1024px) { .grid-machines-search { grid-template-columns: repeat(3, 1fr); gap: 20px; } }

    .grid-routes {
      display: flex; flex-direction: column; gap: 14px;
    }

    /* Mobile */
    @media (max-width: 768px) {
      .search-field input { height: 46px; font-size: 15px; padding-right: 44px; }
      .scope-tab { padding: 12px 14px; }
      .route-row { flex-direction: column; align-items: flex-start; gap: 12px; padding: 16px 18px; }
    }
  </style>
</head>
<body>
  <script type="module" src="./js/auth-guard.js"></script>
  <header id="bp-navbar" data-active=""></header>

  <div class="founding-strip">
    <span class="ornament">⬥</span> Find riders <span class="ornament">·</span> machines <span class="ornament">·</span> routes <span class="ornament">⬥</span>
  </div>

  <main class="page" style="padding-top:40px;padding-bottom:80px">

    <header class="page-header" style="padding:16px 0 24px;text-align:center">
      <p class="eyebrow eyebrow-brass" style="margin-bottom:14px;display:inline-flex">The portal</p>
      <h1 style="font-family:var(--font-display);font-style:italic;font-weight:500;line-height:1.05;letter-spacing:-0.01em;text-align:center">
        Search the Portal
      </h1>
    </header>

    <!-- ░ Search input ░ -->
    <div class="search-field" style="margin-bottom:28px">
      <input id="searchInput" type="text" autocomplete="off" placeholder="Search riders, machines, routes..." aria-label="Search" />
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <button id="searchClear" class="search-clear" aria-label="Clear search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <!-- ░ Scope tabs ░ -->
    <div style="text-align:center;margin-bottom:32px">
      <div class="scope-tabs" role="tablist">
        <button class="scope-tab is-on" data-scope="riders" role="tab" aria-selected="true">
          <span>Riders</span><span class="count" data-count="riders"></span>
        </button>
        <button class="scope-tab" data-scope="machines" role="tab" aria-selected="false">
          <span>Machines</span><span class="count" data-count="machines"></span>
        </button>
        <button class="scope-tab" data-scope="routes" role="tab" aria-selected="false">
          <span>Routes</span><span class="count" data-count="routes"></span>
        </button>
      </div>
    </div>

    <!-- ░ Results area ░ -->
    <div id="resultsArea" class="results-area">
      <!-- Filled by JS -->
    </div>
  </main>

  <script type="module">
    import { supabase } from './js/supabase.js'
    import { searchRiders, searchMachines, searchTrips, debounce } from './js/search.js'
    import {
      sendFollowRequest, cancelFollowRequest, acceptFollowRequest, rejectFollowRequest,
      getFollowStatus, getFollowerCount,
    } from './js/follow.js'

    const { esc, avatarHTML } = window.bp

    const state = {
      query: '',
      scope: 'riders',
      counts: { riders: null, machines: null, routes: null },
      inFlight: new Set(), // follow action in-flight
    }

    const input   = document.getElementById('searchInput')
    const clear   = document.getElementById('searchClear')
    const tabs    = document.querySelectorAll('.scope-tab')
    const area    = document.getElementById('resultsArea')

    /* ── Renderers ───────────────────────────────────────── */
    function emptyState() {
      area.innerHTML = `
        <div class="search-empty">
          <p class="search-empty-title">Begin with a name, a machine, or a road.</p>
          <p class="search-empty-body">Search across riders, bikes, and routes.</p>
        </div>`
    }
    function noResults() {
      area.innerHTML = `
        <div class="search-empty">
          <p class="search-empty-title">Nothing found.</p>
          <p class="search-empty-body">Try a different name or keyword.</p>
        </div>`
    }
    function skeletons(n, kind) {
      const c = Math.max(3, Math.min(6, n))
      const parts = []
      for (let i = 0; i < c; i++) {
        if (kind === 'riders') {
          parts.push(`
            <article class="card card-body">
              <div class="rider-card-head">
                <div class="skeleton" style="width:64px;height:64px;border-radius:9999px"></div>
                <div class="rider-card-meta">
                  <div class="skeleton" style="height:16px;width:60%"></div>
                  <div class="skeleton" style="height:11px;width:35%;margin-top:6px"></div>
                </div>
              </div>
              <div class="skeleton" style="height:12px;margin-top:14px;width:90%"></div>
              <div class="skeleton" style="height:12px;margin-top:6px;width:70%"></div>
              <div class="skeleton" style="height:36px;margin-top:18px;width:100%"></div>
            </article>`)
        } else if (kind === 'machines') {
          parts.push(`
            <article class="card card-body-flush">
              <div class="skeleton" style="aspect-ratio:4/3;width:100%;border-top-left-radius:var(--r-lg);border-top-right-radius:var(--r-lg)"></div>
              <div class="card-body">
                <div class="skeleton" style="height:10px;width:40%"></div>
                <div class="skeleton" style="height:18px;width:70%;margin-top:8px"></div>
                <div class="skeleton" style="height:11px;width:50%;margin-top:8px"></div>
              </div>
            </article>`)
        } else {
          parts.push(`
            <article class="card route-row">
              <div class="route-row-info">
                <div class="skeleton" style="height:18px;width:55%"></div>
                <div class="skeleton" style="height:12px;width:40%;margin-top:8px"></div>
              </div>
              <div class="skeleton" style="width:120px;height:32px"></div>
            </article>`)
        }
      }
      return parts.join('')
    }

    /* ── Result grids ───────────────────────────────────── */
    function riderCardHTML(p, status) {
      const followers = (p.__followers != null) ? p.__followers : null
      const followBtn = followButtonHTML(p.id, status, 'rider')
      return `
        <article class="card card-body rider-card fade-up" data-user="${esc(p.id)}">
          <div class="rider-card-head">
            ${avatarHTML(p.avatar_url, p.full_name || p.username, 56)}
            <div class="rider-card-meta">
              <p class="rider-card-name truncate">${esc(p.full_name || p.username || 'Rider')}</p>
              <p class="rider-card-handle truncate">@${esc(p.username || 'rider')}</p>
              ${p.bike_model ? `<div class="rider-card-bike"><span class="badge badge-brass">${esc(p.bike_model)}</span></div>` : ''}
            </div>
          </div>
          ${p.bio ? `<p class="rider-card-bio line-clamp-2">${esc(p.bio)}</p>` : ''}
          <div class="rider-card-foot">
            <span class="rider-card-followers">${followers != null ? followers + (followers === 1 ? ' follower' : ' followers') : '— follower'}</span>
            ${followBtn}
          </div>
        </article>`
    }
    function machineCardHTML(b) {
      const prof = b.profiles || {}
      const meta = [b.year, b.engine_cc ? b.engine_cc + ' cc' : null, b.color].filter(Boolean).join(' · ')
      return `
        <article class="card card-body-flush machine-card fade-up" data-bike="${esc(b.id)}">
          <div class="machine-card-img">
            ${b.photo_url
              ? `<img src="${esc(b.photo_url)}" alt="${esc(b.make + ' ' + b.model)}" loading="lazy" width="600" height="450" />`
              : `<div class="machine-card-img-placeholder"><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.45"><circle cx="6" cy="17" r="3"/><circle cx="18" cy="17" r="3"/><path d="M9 17h6l2-7H7l-1 4M5 10h14"/></svg></div>`}
          </div>
          <div class="machine-card-body">
            <div class="section-label no-rule" style="font-size:10px;margin-bottom:6px">${esc((b.make || '').toUpperCase())}</div>
            <p class="machine-card-title">${esc(b.make)} ${esc(b.model)}</p>
            <p class="machine-card-meta">${esc(meta || '—')}</p>
            <div class="machine-card-foot">
              <div class="row row-2 min-w-0" style="align-items:center;flex:1">
                ${avatarHTML(prof.avatar_url, prof.full_name || prof.username, 24)}
                <span class="truncate" style="font-size:12px;color:var(--c-text-3)">@${esc(prof.username || 'rider')}</span>
              </div>
            </div>
          </div>
        </article>`
    }
    function routeCardHTML(t) {
      const prof = t.profiles || {}
      const date = t.trip_date ? new Date(t.trip_date).toLocaleDateString(undefined, { day: 'numeric', month: 'short' }) : ''
      return `
        <article class="card route-row lift fade-up">
          <div class="route-row-info">
            <p class="route-card-title" style="margin:0">${esc(t.title)}</p>
            <p class="route-card-route" style="margin-top:4px">${esc(t.start_loc || '—')} <span class="arrow">→</span> ${esc(t.end_loc || '—')}${date ? ' · ' + esc(date) : ''}</p>
            <div class="row row-3 mt-3" style="flex-wrap:wrap;gap:8px">
              <span class="badge badge-brass">${esc(t.difficulty || 'Medium')}</span>
              <span style="font-size:11.5px;letter-spacing:0.08em;color:var(--c-text-3);text-transform:uppercase;font-weight:500">${t.distance_km || '—'} km</span>
            </div>
          </div>
          <div class="route-row-owner">
            ${avatarHTML(prof.avatar_url, prof.full_name || prof.username, 24)}
            <span class="truncate" style="max-width:140px">@${esc(prof.username || 'rider')}</span>
          </div>
        </article>`
    }

    /* ── Follow button factory ──────────────────────────── */
    function followButtonHTML(targetId, status, context) {
      // context: 'rider' | 'feed-rail'
      const sid = `fbtn-${targetId}-${context}`
      if (status === 'accepted') {
        return `<button id="${sid}" class="btn btn-ghost btn-sm follow-btn" data-target="${esc(targetId)}" data-state="accepted" data-context="${context}"><span class="btn-label">Following</span></button>`
      }
      if (status === 'pending_sent') {
        return `<button id="${sid}" class="btn btn-ghost btn-sm follow-btn" data-target="${esc(targetId)}" data-state="pending_sent" data-context="${context}"><span class="btn-label">Requested</span></button>`
      }
      if (status === 'pending_received') {
        return `<div class="follow-actions" data-target="${esc(targetId)}" data-context="${context}">
          <button class="btn btn-primary btn-sm follow-btn" data-act="accept" data-target="${esc(targetId)}" data-context="${context}"><span class="btn-label">Accept</span></button>
          <button class="btn btn-ghost btn-sm follow-btn" data-act="decline" data-target="${esc(targetId)}" data-context="${context}"><span class="btn-label">Decline</span></button>
        </div>`
      }
      return `<button id="${sid}" class="btn btn-primary btn-sm follow-btn" data-target="${esc(targetId)}" data-state="none" data-context="${context}"><span class="btn-label">Follow +</span></button>`
    }

    function swapBtnLabel(btn, newLabel) {
      const label = btn.querySelector('.btn-label')
      if (!label) { btn.textContent = newLabel; return }
      btn.classList.add('is-swapping')
      setTimeout(() => {
        label.textContent = newLabel
        btn.classList.remove('is-swapping')
      }, 100)
    }

    async function refreshFollowBtn(btn, newStatus) {
      const target = btn.getAttribute('data-target')
      const ctx    = btn.getAttribute('data-context')
      const parent = btn.closest('.follow-actions') || btn.parentElement
      parent.innerHTML = followButtonHTML(target, newStatus, ctx)
    }

    /* ── Follow click handler ───────────────────────────── */
    async function onFollowClick(btn) {
      const targetId = btn.getAttribute('data-target')
      const ctx      = btn.getAttribute('data-context')
      const currentState = btn.getAttribute('data-state') || 'none'
      const act      = btn.getAttribute('data-act')
      if (state.inFlight.has(targetId)) return
      state.inFlight.add(targetId)

      btn.disabled = true
      btn.classList.add('pop')
      setTimeout(() => btn.classList.remove('pop'), 240)

      try {
        if (act === 'accept') {
          const r = await acceptFollowRequest(targetId)
          if (!r.success) throw new Error(r.error)
          await refreshFollowBtn(btn, 'none')
        } else if (act === 'decline') {
          const r = await rejectFollowRequest(targetId)
          if (!r.success) throw new Error(r.error)
          await refreshFollowBtn(btn, 'none')
        } else if (currentState === 'none') {
          const r = await sendFollowRequest(targetId)
          if (!r.success) throw new Error(r.error)
          await refreshFollowBtn(btn, 'pending_sent')
        } else if (currentState === 'pending_sent') {
          const r = await cancelFollowRequest(targetId)
          if (!r.success) throw new Error(r.error)
          await refreshFollowBtn(btn, 'none')
        } else if (currentState === 'accepted') {
          const r = await unfollowUser(targetId)
          if (!r.success) throw new Error(r.error)
          await refreshFollowBtn(btn, 'none')
        }
      } catch (e) {
        if (window.bp.toast) window.bp.toast(e.message || 'Couldn’t update follow.', 'error')
        await refreshFollowBtn(btn, currentState)
      } finally {
        state.inFlight.delete(targetId)
      }
    }

    area.addEventListener('click', (e) => {
      const btn = e.target.closest('.follow-btn')
      if (!btn) return
      e.preventDefault()
      onFollowClick(btn)
    })

    /* ── Run search ─────────────────────────────────────── */
    const run = debounce(async () => {
      const q = input.value.trim()
      state.query = q
      clear.classList.toggle('is-on', q.length > 0)
      if (!q) { renderEmpty(); return }
      renderSkeletons()
      try {
        if (state.scope === 'riders')      await runRiders(q)
        else if (state.scope === 'machines') await runMachines(q)
        else                                await runRoutes(q)
      } catch (err) {
        noResults()
      }
    }, 350)

    async function runRiders(q) {
      const list = await searchRiders(q)
      state.counts.riders = list.length
      updateCount('riders', list.length)
      if (!list.length) { noResults(); return }
      // Follow status + follower count
      const myId = (await supabase.auth.getUser()).data.user?.id
      const decorated = await Promise.all(list.map(async (p) => {
        const [status, followers] = await Promise.all([
          (p.id !== myId) ? getFollowStatus(p.id) : Promise.resolve('none'),
          getFollowerCount(p.id),
        ])
        return { ...p, __status: status, __followers: followers }
      }))
      const html = decorated.map((p, i) => {
        const stagger = Math.min(5, (i % 5) + 1)
        return riderCardHTML(p, p.__status).replace('fade-up', `fade-up fade-up-${stagger}`)
      }).join('')
      area.innerHTML = `<div class="grid-riders">${html}</div>`
    }

    async function runMachines(q) {
      const list = await searchMachines(q)
      state.counts.machines = list.length
      updateCount('machines', list.length)
      if (!list.length) { noResults(); return }
      const html = list.map((b, i) => {
        const stagger = Math.min(5, (i % 5) + 1)
        return machineCardHTML(b).replace('fade-up', `fade-up fade-up-${stagger}`)
      }).join('')
      area.innerHTML = `<div class="grid-machines-search">${html}</div>`
    }

    async function runRoutes(q) {
      const list = await searchTrips(q)
      state.counts.routes = list.length
      updateCount('routes', list.length)
      if (!list.length) { noResults(); return }
      const html = list.map((t, i) => {
        const stagger = Math.min(5, (i % 5) + 1)
        return routeCardHTML(t).replace('fade-up', `fade-up fade-up-${stagger}`)
      }).join('')
      area.innerHTML = `<div class="grid-routes">${html}</div>`
    }

    function renderEmpty() {
      state.counts.riders = state.counts.machines = state.counts.routes = null
      ['riders', 'machines', 'routes'].forEach(k => updateCount(k, null))
      emptyState()
    }
    function renderSkeletons() {
      area.innerHTML = `<div class="grid-${state.scope === 'routes' ? 'routes' : (state.scope === 'riders' ? 'riders' : 'machines-search')}">${skeletons(6, state.scope)}</div>`
    }

    function updateCount(scope, n) {
      const el = document.querySelector(`[data-count="${scope}"]`)
      if (!el) return
      el.textContent = n == null ? '' : '(' + n + ')'
    }

    /* ── Tab switching with fade ────────────────────────── */
    tabs.forEach(t => t.addEventListener('click', () => {
      if (t.classList.contains('is-on')) return
      tabs.forEach(x => { x.classList.remove('is-on'); x.setAttribute('aria-selected', 'false') })
      t.classList.add('is-on')
      t.setAttribute('aria-selected', 'true')
      state.scope = t.getAttribute('data-scope')
      area.classList.add('is-fading')
      setTimeout(async () => {
        if (state.query) run()
        else renderEmpty()
        area.classList.remove('is-fading')
      }, 140)
    }))

    /* ── Input wiring ───────────────────────────────────── */
    input.addEventListener('input', run)
    clear.addEventListener('click', () => {
      input.value = ''
      clear.classList.remove('is-on')
      state.query = ''
      renderEmpty()
      input.focus()
    })

    /* ── Init ───────────────────────────────────────────── */
    setTimeout(() => input.focus(), 100)
    renderEmpty()
  </script>
</body>
</html>
