<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Activity · Bikers Portal</title>
  <link rel="icon" href="/assets/logo.svg" type="image/svg+xml" />
  <script src="./js/app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./assets/style.css" />
  <style>
    .notif-page {
      max-width: 680px;
      margin: 0 auto;
      padding: 32px 24px 80px;
    }
    .notif-page-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--color-border);
      margin-bottom: 24px;
    }
    .notif-page-header .title-group h1 {
      font-size: 20px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-family: var(--font-display);
      color: var(--color-text);
    }
    .notif-page-header .title-group p {
      font-family: var(--font-heritage);
      font-style: italic;
      font-size: 14px;
      color: var(--color-text-3);
      margin-top: 4px;
    }
    .notif-page-header .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    #notif-count-label {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--color-text-3);
      letter-spacing: 0.08em;
    }
    #mark-all-read-btn {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--color-brass);
      background: transparent;
      border: 1px solid var(--color-border-2);
      height: 32px;
      padding: 0 12px;
      cursor: pointer;
      transition: all var(--t-fast) var(--ease-out);
    }
    #mark-all-read-btn:hover { color: var(--color-gold); border-color: var(--color-brass); }
    #notifications-list { min-height: 200px; }
    .notif-section { margin-bottom: 24px; }
    .notif-group-header {
      font-family: var(--font-display);
      font-size: 11px;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--color-text-faint);
      padding-bottom: 8px;
      margin-bottom: 4px;
      border-bottom: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .notif-group-header::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--color-border);
    }
    .notif-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      cursor: pointer;
      transition: background var(--t-med) var(--ease-out);
      position: relative;
      border-left: 2px solid transparent;
      border-bottom: 1px solid var(--color-border);
    }
    .notif-row:last-child { border-bottom: none; }
    .notif-row:hover { background: var(--color-ink-3); }
    .notif-row.unread {
      border-left-color: var(--color-brass);
      background: rgba(201, 168, 76, 0.03);
    }
    .notif-avatar { flex: 0 0 auto; }
    .notif-icon {
      width: 16px;
      height: 16px;
      flex: 0 0 auto;
      color: var(--color-text-faint);
    }
    .notif-body { flex: 1; min-width: 0; }
    .notif-text {
      font-size: 13px;
      line-height: 1.4;
      color: var(--color-text);
    }
    .notif-text strong {
      font-family: var(--font-display);
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .notif-time {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--color-text-faint);
      margin-top: 3px;
      letter-spacing: 0.04em;
    }
    .notif-unread-indicator {
      width: 8px;
      height: 8px;
      background: var(--color-brass);
      border-radius: 999px;
      flex: 0 0 auto;
    }
    @media (max-width: 480px) {
      .notif-page { padding: 16px 12px 60px; }
      .notif-page-header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <script type="module" src="./js/auth-guard.js"></script>
  <header id="bp-navbar" data-active=""></header>

  <main class="notif-page">
    <div class="notif-page-header">
      <div class="title-group">
        <h1>Activity</h1>
        <p>What's happening in your chapter.</p>
      </div>
      <div class="header-actions">
        <span id="notif-count-label">0 unread</span>
        <button id="mark-all-read-btn">Mark all read</button>
      </div>
    </div>

    <div id="notifications-list"></div>
  </main>

  <footer class="site-footer" style="margin-top:0">
    Bikers Portal <span style="color:var(--color-brass);padding:0 8px">·</span> EST. MMXXIV <span style="color:var(--color-brass);padding:0 8px">·</span> Charted by riders, for riders
  </footer>

  <script type="module">
    import { supabase, getUnreadNotificationCount, subscribeToNotifications } from './js/supabase.js'
    import NotificationsModule from './js/notifications.js'
    NotificationsModule.init()

    // ── Nav injection ─────────────────────────────────────
    function injectNav() {
      const navLinks = document.querySelector('.nav-links')
      if (!navLinks || document.getElementById('nav-messages')) return

      const msgLink = document.createElement('a')
      msgLink.href = '/messages.html'
      msgLink.className = 'nav-link'
      msgLink.id = 'nav-messages'
      msgLink.innerHTML = '<span>Messages</span><span class="nav-badge" id="msg-unread-badge" style="display:none"></span>'
      navLinks.appendChild(msgLink)

      const notifLink = document.createElement('a')
      notifLink.href = '/notifications.html'
      notifLink.className = 'nav-link'
      notifLink.id = 'nav-notifications'
      notifLink.innerHTML = '<span>Notifications</span><span class="nav-badge" id="notif-unread-badge" style="display:none"></span>'
      navLinks.appendChild(notifLink)

      const mobileNav = document.querySelector('.nav-mobile nav')
      if (mobileNav) {
        const mMsg = document.createElement('a')
        mMsg.href = '/messages.html'
        mMsg.className = 'nav-link'
        mMsg.textContent = 'Messages'
        mobileNav.appendChild(mMsg)
        const mNotif = document.createElement('a')
        mNotif.href = '/notifications.html'
        mNotif.className = 'nav-link'
        mNotif.textContent = 'Notifications'
        mobileNav.appendChild(mNotif)
      }
    }

    // ── Badge loader ──────────────────────────────────────
    async function loadNavBadges() {
      const { data: { user } } = await supabase.auth.getUser()
      if (!user) return

      const notifCount = await getUnreadNotificationCount()
      const badge = document.getElementById('notif-unread-badge')
      if (badge) {
        badge.textContent = notifCount > 99 ? '99+' : notifCount
        badge.style.display = notifCount > 0 ? 'flex' : 'none'
      }

      let notifChannel = subscribeToNotifications(user.id, () => {
        const b = document.getElementById('notif-unread-badge')
        if (b) {
          const current = parseInt(b.textContent) || 0
          b.textContent = current + 1 > 99 ? '99+' : (current + 1)
          b.style.display = 'flex'
          b.style.transition = 'transform 150ms ease'
          b.style.transform = 'scale(1.3)'
          setTimeout(() => { b.style.transform = 'scale(1)' }, 150)
        }
      })

      window.addEventListener('beforeunload', () => {
        if (notifChannel) notifChannel.unsubscribe()
      })
    }

    injectNav()
    loadNavBadges()
  </script>

  <style>
    .nav-badge {
      margin-left: auto;
      background: var(--color-racing);
      color: var(--color-paper);
      font-size: 10px;
      font-weight: 700;
      font-family: var(--font-body);
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      letter-spacing: 0;
    }
  </style>
</body>
</html>
