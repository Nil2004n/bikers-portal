<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account · Bikers Portal</title>
  <link rel="icon" href="/assets/logo.svg" type="image/svg+xml" />
  <script src="./js/app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./assets/style.css" />
</head>
<body class="min-h-screen bg-ink-900 text-bone font-sans antialiased">

  <div class="min-h-screen flex flex-col">
    <header class="px-5 md:px-10 pt-7 pb-2">
      <a href="/index.html" class="inline-flex items-center">
        <img src="/assets/logo.svg" alt="Bikers Portal" class="h-8 w-auto" />
      </a>
    </header>

    <main class="flex-1 flex items-center justify-center px-5 py-8">
      <div class="w-full max-w-lg">
        <div class="text-center mb-7">
          <p class="bp-section-label justify-center mb-3">Membership</p>
          <h1 class="font-serif text-[26px] md:text-[30px] text-bone">Begin your record on the road.</h1>
          <p class="text-bone-muted text-[13.5px] mt-2 max-w-sm mx-auto leading-relaxed">
            Membership begins with identity, discipline, and taste.
          </p>
        </div>

        <form id="regForm" class="bp-card p-6 md:p-8 space-y-7" novalidate>
          <!-- Identity -->
          <section>
            <p class="bp-section-label mb-4">I · Identity</p>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div>
                <label class="bp-label" for="full_name">Full Name</label>
                <input id="full_name" name="full_name" type="text" required class="bp-input" placeholder="e.g. Aarav Mehta" />
                <p class="bp-msg bp-msg-error hidden" data-err="full_name"></p>
              </div>
              <div>
                <label class="bp-label" for="username">Username</label>
                <input id="username" name="username" type="text" required class="bp-input" placeholder="aarav_rides" autocomplete="username" />
                <p class="bp-msg bp-msg-error hidden" data-err="username"></p>
                <p class="bp-msg bp-msg-muted">Letters, numbers, underscores.</p>
              </div>
            </div>
          </section>

          <div class="bp-divider"></div>

          <!-- Access -->
          <section>
            <p class="bp-section-label mb-4">II · Access</p>
            <div class="space-y-4">
              <div>
                <label class="bp-label" for="email">Email</label>
                <input id="email" name="email" type="email" required class="bp-input" placeholder="you@domain.com" autocomplete="email" />
                <p class="bp-msg bp-msg-error hidden" data-err="email"></p>
              </div>
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                  <label class="bp-label" for="password">Password</label>
                  <input id="password" name="password" type="password" required minlength="8" class="bp-input" placeholder="Min. 8 characters" autocomplete="new-password" />
                  <p class="bp-msg bp-msg-error hidden" data-err="password"></p>
                </div>
                <div>
                  <label class="bp-label" for="password2">Confirm</label>
                  <input id="password2" name="password2" type="password" required minlength="8" class="bp-input" placeholder="Repeat password" autocomplete="new-password" />
                  <p class="bp-msg bp-msg-error hidden" data-err="password2"></p>
                </div>
              </div>
            </div>
          </section>

          <div class="bp-divider"></div>

          <!-- Machine -->
          <section>
            <p class="bp-section-label mb-4">III · The Machine</p>
            <div class="grid grid-cols-1 sm:grid-cols-[1fr_auto] gap-4 items-end">
              <div>
                <label class="bp-label" for="bike_model">Preferred Machine</label>
                <input id="bike_model" name="bike_model" type="text" class="bp-input" placeholder="e.g. Royal Enfield Classic 350" />
              </div>
              <div>
                <label class="bp-label">Avatar (optional)</label>
                <div class="flex items-center gap-3">
                  <div id="avatarPreview" class="bp-avatar-fallback" style="width:44px;height:44px;font-size:14px">?</div>
                  <label class="bp-btn bp-btn-ghost cursor-pointer">
                    <span>Choose image</span>
                    <input id="avatarFile" type="file" accept="image/*" class="hidden" />
                  </label>
                </div>
                <p class="bp-msg bp-msg-error hidden" data-err="avatar"></p>
              </div>
            </div>
          </section>

          <p id="formErr" class="bp-msg bp-msg-error hidden"></p>

          <button id="submitBtn" type="submit" class="bp-btn bp-btn-primary w-full justify-center">
            <span class="btn-label">Take the oath</span>
          </button>

          <p class="text-center text-bone-muted text-[13px]">
            Already a member?
            <a href="/index.html" class="text-brass hover:text-brass-light ml-1">Sign in</a>
          </p>
        </form>
      </div>
    </main>
  </div>

  <script type="module">
    import { supabase } from './js/supabase.js'

    const form  = document.getElementById('regForm')
    const btn   = document.getElementById('submitBtn')
    const label = btn.querySelector('.btn-label')
    const formErr = document.getElementById('formErr')
    const avatarFile = document.getElementById('avatarFile')
    const avatarPrev = document.getElementById('avatarPreview')

    // If already signed in, complete any pending profile then go to feed
    const { data: { session } } = await supabase.auth.getSession()
    if (session) {
      await window.bp.completePendingProfile()
      window.location.replace('/feed.html')
    }

    // Avatar preview
    avatarFile.addEventListener('change', () => {
      const f = avatarFile.files && avatarFile.files[0]
      if (!f) return
      const reader = new FileReader()
      reader.onload = () => {
        avatarPrev.outerHTML = `<img id="avatarPreview" src="${reader.result}" alt="" class="rounded-full object-cover border border-bronze" style="width:44px;height:44px" />`
      }
      reader.readAsDataURL(f)
    })

    function setLoading(on) {
      btn.disabled = on
      btn.innerHTML = on
        ? '<span class="spinner"></span><span class="btn-label">Forging your record</span>'
        : '<span class="btn-label">Take the oath</span>'
    }
    function clearErrs() {
      formErr.classList.add('hidden')
      document.querySelectorAll('[data-err]').forEach(e => e.classList.add('hidden'))
    }
    function fieldErr(name, msg) {
      const el = document.querySelector(`[data-err="${name}"]`)
      if (!el) { formErr.textContent = msg; formErr.classList.remove('hidden'); return }
      el.textContent = msg; el.classList.remove('hidden')
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      clearErrs()
      const full_name = document.getElementById('full_name').value.trim()
      const username  = document.getElementById('username').value.trim()
      const email     = document.getElementById('email').value.trim()
      const pw        = document.getElementById('password').value
      const pw2       = document.getElementById('password2').value
      const bike_model= document.getElementById('bike_model').value.trim()
      const file      = avatarFile.files && avatarFile.files[0]

      let bad = false
      if (!full_name) { fieldErr('full_name', 'Enter your full name.'); bad = true }
      if (!username)  { fieldErr('username',  'Pick a username.');       bad = true }
      else if (!/^[a-zA-Z0-9_]{3,20}$/.test(username)) { fieldErr('username', '3–20 chars: letters, numbers, underscore.'); bad = true }
      if (!email)              { fieldErr('email', 'Enter your email.'); bad = true }
      else if (!/^\S+@\S+\.\S+$/.test(email)) { fieldErr('email', 'That email doesn’t look right.'); bad = true }
      if (pw.length < 8)       { fieldErr('password', 'At least 8 characters.'); bad = true }
      if (pw !== pw2)           { fieldErr('password2', 'Passwords don’t match.'); bad = true }
      if (file && file.size > 1.5 * 1024 * 1024) { fieldErr('avatar', 'Avatar must be under 1.5 MB.'); bad = true }
      if (bad) return

      // Convert avatar to data URL for cross-session persistence if confirmation is on
      let avatarDataUrl = null
      if (file) avatarDataUrl = await new Promise((r) => {
        const fr = new FileReader(); fr.onload = () => r(fr.result); fr.readAsDataURL(file)
      })

      localStorage.setItem('bp_pending_profile', JSON.stringify({
        full_name, username, bio: '', bike_model, avatarDataUrl,
      }))

      setLoading(true)
      const { data, error } = await supabase.auth.signUp({
        email, password: pw,
        options: { data: { full_name, username, bike_model } },
      })
      if (error) {
        setLoading(false)
        const msg = error.message || ''
        if (/already registered/i.test(msg))        fieldErr('email', 'An account with that email already exists.')
        else if (/rate|limit|exceeded/i.test(msg))  fieldErr('formErr', 'Email service is at its hourly limit. Disable email confirmation in your Supabase dashboard (Authentication → Sign In/Up) or configure a custom SMTP, then try again.')
        else                                         fieldErr('formErr', msg)
        return
      }
      if (!data.session) {
        // Email confirmation required — keep pending profile, tell user to check email
        setLoading(false)
        form.innerHTML = `
          <div class="text-center py-4">
            <p class="bp-section-label justify-center mb-4">Confirmation Sent</p>
            <h2 class="font-serif text-[20px] text-bone">Check your email, rider.</h2>
            <p class="text-bone-muted text-[13.5px] mt-3 leading-relaxed max-w-sm mx-auto">
              We sent a confirmation link to <span class="text-bone">${email}</span>.
              Click it, then return here to sign in and your record will be waiting.
            </p>
            <a href="/index.html" class="bp-btn bp-btn-primary mt-7 inline-flex">Back to sign in</a>
          </div>`
        return
      }
      // Session exists (autoconfirm on) — complete profile now
      const result = await window.bp.completePendingProfile()
      if (!result.ok) {
        setLoading(false)
        const msg = result.reason || ''
        if (/duplicate|unique/i.test(msg)) {
          fieldErr('username', 'That username is already taken. Try another.')
          try { await supabase.auth.signOut() } catch (_) {}
        } else {
          fieldErr('formErr', 'Couldn’t complete your profile. ' + msg)
        }
        return
      }
      window.bp.toast('Welcome to the society.', 'success')
      window.location.href = '/feed.html'
    })
  </script>
</body>
</html>
