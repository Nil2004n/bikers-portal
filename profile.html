<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dossier · Bikers Portal</title>
  <link rel="icon" href="/assets/logo.svg" type="image/svg+xml" />
  <script src="./js/app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./assets/style.css" />
</head>
<body class="bg-ink-900 text-bone">
  <div class="canvas-grain"></div>

  <script type="module" src="./js/auth-guard.js"></script>
  <header id="bp-navbar" data-active=""></header>

  <main class="page-narrow" style="padding-top:32px;padding-bottom:80px;max-width:920px">

    <!-- ░░ Dossier header ░░ -->
    <section class="dossier fade-up">
      <div class="dossier-head">
        <div id="bigAvatar" class="skeleton avatar avatar-xl avatar-ring" style="width:104px;height:104px"></div>
        <div class="dossier-meta" style="text-align:left">
          <p class="eyebrow brass" id="dossierLabel" style="display:block;margin-bottom:6px">Rider dossier</p>
          <h1 class="dossier-name" id="dName">…</h1>
          <p class="dossier-handle" id="dHandle">…</p>
          <p class="dossier-bio" id="dBio">…</p>
          <div class="row row-2 mt-5" style="flex-wrap:wrap">
            <span id="dBike" class="badge badge-brass">—</span>
          </div>
        </div>
        <div class="dossier-actions">
          <button id="editBtn"  class="btn btn-primary btn-sm">Edit dossier</button>
          <button id="shareBtn" class="btn btn-ghost btn-sm">Share profile</button>
        </div>
      </div>

      <div class="dossier-stats">
        <div class="stat"><span id="statPosts" class="stat-value">0</span><span class="stat-label">Posts</span></div>
        <div class="stat"><span id="statBikes" class="stat-value">0</span><span class="stat-label">Machines</span></div>
        <div class="stat"><span id="statTrips" class="stat-value">0</span><span class="stat-label">Routes</span></div>
      </div>
    </section>

    <!-- ░░ Edit panel ░░ -->
    <section id="editPanel" class="hidden mt-7">
      <form id="editForm" class="card card-body card-stitched" novalidate>
        <div class="row row-between mb-6" style="align-items:center">
          <p class="eyebrow brass">Edit dossier</p>
          <button type="button" id="editCancel" class="btn-subtle">Close</button>
        </div>

        <div class="grid-editform">
          <div class="field" style="grid-row:1 / 3">
            <label class="field-label">Avatar</label>
            <div id="editAvatarPreview" class="skeleton avatar avatar-xl avatar-ring" style="width:88px;height:88px"></div>
            <label class="btn btn-ghost btn-sm mt-3" style="cursor:pointer;width:100%">
              <span>Choose image</span>
              <input id="editAvatarFile" type="file" accept="image/*" class="sr-only" />
            </label>
            <p class="field-hint mt-2" style="font-size:11px">Under 1.5 MB.</p>
            <p class="field-error hidden" data-err="avatar"></p>
          </div>

          <div class="field">
            <label class="field-label">Full name</label>
            <input name="full_name" class="input" />
            <p class="field-error hidden" data-err="full_name"></p>
          </div>
          <div class="field">
            <label class="field-label">Username</label>
            <input name="username" class="input" />
            <p class="field-error hidden" data-err="username"></p>
          </div>
          <div class="field" style="grid-column:2 / -1">
            <label class="field-label">Bio</label>
            <textarea name="bio" rows="3" class="textarea" placeholder="A line or two about your road."></textarea>
          </div>
          <div class="field" style="grid-column:2 / -1">
            <label class="field-label">Preferred machine</label>
            <input name="bike_model" class="input" placeholder="e.g. Royal Enfield Interceptor 650" />
          </div>
        </div>

        <p id="editErr" class="msg msg-error hidden mt-4"></p>

        <div class="row row-end gap-3 mt-6">
          <button type="button" id="editCancel2" class="btn btn-ghost">Cancel</button>
          <button type="submit" id="editSubmit" class="btn btn-primary"><span class="btn-label">Save dossier</span></button>
        </div>
      </form>
    </section>

    <!-- ░░ Tabs ░░ -->
    <section class="mt-9">
      <div class="tabs">
        <button class="tab is-on" data-tab="posts">My posts</button>
        <button class="tab"        data-tab="bikes">My machines</button>
        <button class="tab"        data-tab="trips">My routes</button>
      </div>
      <div id="tabPanel" class="tab-panel" style="min-height:160px"></div>
    </section>
  </main>

  <style>
    .grid-editform {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }
    @media (min-width: 640px) {
      .grid-editform { grid-template-columns: auto 1fr; gap: 18px 24px; }
    }
    /* fallback grid-machines for narrower viewports */
    @media (max-width: 1023px) {
      .grid-machines { grid-template-columns: 1fr 1fr; gap: 16px; }
    }
    @media (max-width: 639px) {
      .grid-machines { grid-template-columns: 1fr; }
    }
  </style>

  <script type="module">
    import { supabase } from './js/supabase.js'
    const { esc, timeAgo, avatarHTML, toast } = window.bp
    const confirmModal = window.bp.confirm

    const me = window.__bpUser
    let profile = null
    let activeTab = 'posts'
    const cache = { posts: null, bikes: null, trips: null }

    async function loadProfile() {
      profile = await window.bp.loadCurrentProfile()
      paintDossier()
      paintStats()
    }
    function paintDossier() {
      const av = document.getElementById('bigAvatar')
      av.outerHTML = avatarHTML(profile.avatar_url, profile.full_name || profile.username, 104)
      document.getElementById('dName').textContent   = profile.full_name || 'Rider'
      document.getElementById('dHandle').textContent = '@' + (profile.username || 'rider')
      const bio = profile.bio && profile.bio.trim()
      document.getElementById('dBio').textContent = bio || 'No introduction yet — share a line or two about your road.'
      const dBike = document.getElementById('dBike')
      dBike.textContent = profile.bike_model ? 'Machine — ' + profile.bike_model : 'No machine listed'
      const ep = document.getElementById('editAvatarPreview')
      ep.outerHTML = avatarHTML(profile.avatar_url, profile.full_name || profile.username, 88)
      const f = document.getElementById('editForm')
      f.full_name.value = profile.full_name || ''
      f.username.value  = profile.username || ''
      f.bio.value       = profile.bio || ''
      f.bike_model.value= profile.bike_model || ''
    }
    async function paintStats() {
      const [pc, bc, tc] = await Promise.all([
        supabase.from('posts').select('id', { count: 'exact', head: true }).eq('user_id', me.id),
        supabase.from('bikes').select('id', { count: 'exact', head: true }).eq('user_id', me.id),
        supabase.from('trips').select('id', { count: 'exact', head: true }).eq('user_id', me.id),
      ])
      const paint = (id, n) => {
        const el = document.getElementById(id)
        if (!el) return
        el.textContent = n || 0
        el.classList.remove('count-pop'); void el.offsetWidth; el.classList.add('count-pop')
      }
      paint('statPosts', pc.count)
      paint('statBikes', bc.count)
      paint('statTrips', tc.count)
    }

    const editPanel = document.getElementById('editPanel')
    document.getElementById('editBtn').addEventListener('click', () => editPanel.classList.remove('hidden'))
    document.getElementById('editCancel').addEventListener('click', () => editPanel.classList.add('hidden'))
    document.getElementById('editCancel2').addEventListener('click', () => editPanel.classList.add('hidden'))
    const editAvatarFile = document.getElementById('editAvatarFile')
    let editAvatarObj = null
    editAvatarFile.addEventListener('change', () => {
      const f = editAvatarFile.files && editAvatarFile.files[0]
      if (!f) return
      if (f.size > 1.5 * 1024 * 1024) {
        const el = document.querySelector('[data-err=avatar]')
        el.textContent = 'Avatar must be under 1.5 MB.'; el.classList.remove('hidden'); return
      }
      const url = URL.createObjectURL(f)
      const ep = document.getElementById('editAvatarPreview')
      ep.outerHTML = `<img id="editAvatarPreview" src="${url}" alt="" class="avatar avatar-xl" style="width:88px;height:88px;object-fit:cover;box-shadow:0 0 0 1px var(--c-brass-line), 0 0 0 4px var(--c-bg)" />`
      editAvatarObj = f
    })

    document.getElementById('editForm').addEventListener('submit', async (e) => {
      e.preventDefault()
      const f = e.target
      const errEl = document.getElementById('editErr')
      errEl.classList.add('hidden')
      f.querySelectorAll('[data-err]').forEach(el => el.classList.add('hidden'))
      const full_name = f.full_name.value.trim()
      const username  = f.username.value.trim()
      const bio       = f.bio.value.trim()
      const bike_model= f.bike_model.value.trim()
      let bad = false
      if (!full_name) { const el=f.querySelector('[data-err=full_name]'); el.textContent='Enter your name.'; el.classList.remove('hidden'); bad=true }
      if (!username)  { const el=f.querySelector('[data-err=username]');  el.textContent='Pick a username.'; el.classList.remove('hidden'); bad=true }
      else if (!/^[a-zA-Z0-9_]{3,20}$/.test(username)) { const el=f.querySelector('[data-err=username]'); el.textContent='3–20 chars: letters, numbers, underscore.'; el.classList.remove('hidden'); bad=true }
      if (bad) return

      const submit = document.getElementById('editSubmit')
      submit.disabled = true
      submit.innerHTML = '<span class="spinner"></span><span class="btn-label">Saving</span>'
      try {
        let avatar_url = profile.avatar_url || null
        if (editAvatarObj) {
          const ext = (editAvatarObj.type.split('/')[1] || 'jpg').replace('jpeg','jpg')
          const path = `${me.id}/avatar-${Date.now()}.${ext}`
          const { error: upErr } = await supabase.storage.from('avatars').upload(path, editAvatarObj, { upsert: true, contentType: editAvatarObj.type })
          if (upErr) throw upErr
          const { data: pub } = supabase.storage.from('avatars').getPublicUrl(path)
          avatar_url = pub.publicUrl
        }
        const { error } = await supabase.from('profiles').update({
          full_name, username, bio, bike_model, avatar_url,
        }).eq('id', me.id)
        if (error) throw error
        profile = { ...profile, full_name, username, bio, bike_model, avatar_url }
        window.bp.currentProfile = profile
        toast('Dossier updated.', 'success')
        editPanel.classList.add('hidden')
        paintDossier()
        editAvatarObj = null
      } catch (err) {
        const msg = (err && err.message) || ''
        if (/duplicate|unique/i.test(msg) && /username/i.test(msg)) {
          const el = f.querySelector('[data-err=username]')
          el.textContent = 'That username is already taken.'; el.classList.remove('hidden')
        } else {
          errEl.textContent = msg || 'Couldn’t save.'; errEl.classList.remove('hidden')
        }
      } finally {
        submit.disabled = false
        submit.innerHTML = '<span class="btn-label">Save dossier</span>'
      }
    })

    document.getElementById('shareBtn').addEventListener('click', async () => {
      const url = window.location.href
      try { await navigator.clipboard.writeText(url); toast('Profile link copied.', 'success') }
      catch (_) { toast('Couldn’t copy link.', 'error') }
    })

    document.querySelectorAll('.tab').forEach(b => {
      b.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('is-on'))
        b.classList.add('is-on')
        activeTab = b.getAttribute('data-tab')
        renderTab()
      })
    })
    async function renderTab() {
      const panel = document.getElementById('tabPanel')
      panel.classList.remove('tab-panel'); void panel.offsetWidth; panel.classList.add('tab-panel')
      panel.innerHTML = `<div class="stack stack-3"><div class="skeleton" style="height:80px"></div><div class="skeleton" style="height:80px"></div></div>`
      if (activeTab === 'posts')      return renderPosts(panel)
      if (activeTab === 'bikes')      return renderBikes(panel)
      if (activeTab === 'trips')      return renderTrips(panel)
    }
    async function renderPosts(panel) {
      if (!cache.posts) {
        const { data } = await supabase.from('posts')
          .select('id, content, image_url, created_at')
          .eq('user_id', me.id).order('created_at', { ascending: false })
        cache.posts = data || []
      }
      if (!cache.posts.length) {
        panel.innerHTML = `<div class="card card-body-loose empty-state">
          <p class="empty-title">No entries yet.</p>
          <p class="empty-body">The journal is waiting for your first mark.</p>
          <a href="/feed.html" class="btn btn-primary mt-6" style="margin:24px auto 0">Open the journal</a>
        </div>`
        return
      }
      panel.innerHTML = '<div class="stack stack-3">' + cache.posts.map(p => `
        <article class="feed-card fade-up" data-post="${esc(p.id)}">
          <p class="feed-card-body" style="margin:0">${esc(p.content)}</p>
          ${p.image_url ? `<img src="${esc(p.image_url)}" class="feed-card-image" alt="" />` : ''}
          <div class="feed-card-actions" style="border:0;padding:0;margin-top:12px;justify-content:space-between">
            <span style="font-size:11.5px;color:var(--c-text-3)">${timeAgo(p.created_at)}</span>
            <button data-act="delete" class="btn-subtle" style="color:var(--c-error)">Remove</button>
          </div>
        </article>`).join('') + '</div>'
      panel.querySelectorAll('[data-act=delete]').forEach(b => b.addEventListener('click', async (e) => {
        const card = e.target.closest('[data-post]')
        const id = card.getAttribute('data-post')
        const ok = await confirmModal('Remove this entry from the journal?', 'Remove entry')
        if (!ok) return
        await supabase.from('comments').delete().eq('post_id', id)
        await supabase.from('likes').delete().eq('post_id', id)
        const { error } = await supabase.from('posts').delete().eq('id', id).eq('user_id', me.id)
        if (error) { toast('Couldn’t remove entry.', 'error'); return }
        cache.posts = null
        toast('Entry removed.', 'success')
        paintStats()
        renderTab()
      }))
    }
    async function renderBikes(panel) {
      if (!cache.bikes) {
        const { data } = await supabase.from('bikes')
          .select('id, make, model, year, engine_cc, color, description, photo_url, created_at')
          .eq('user_id', me.id).order('created_at', { ascending: false })
        cache.bikes = data || []
      }
      if (!cache.bikes.length) {
        panel.innerHTML = `<div class="card card-body-loose empty-state">
          <p class="empty-title">No machines in the registry.</p>
          <p class="empty-body">Add your first machine from the garage page.</p>
          <a href="/bikes.html" class="btn btn-primary mt-6" style="margin:24px auto 0">Add a machine</a>
        </div>`
        return
      }
      panel.innerHTML = '<div class="grid-machines">' + cache.bikes.map(b => `
        <article class="machine-card fade-up" data-bike="${esc(b.id)}">
          <div class="machine-card-img">
            ${b.photo_url ? `<img src="${esc(b.photo_url)}" alt="" />` : `<div class="machine-card-img-placeholder"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.4"><circle cx="6" cy="17" r="3"/><circle cx="18" cy="17" r="3"/><path d="M9 17h6l2-7H7l-1 4M5 10h14"/></svg></div>`}
          </div>
          <div class="machine-card-body">
            <p class="machine-card-title">${esc(b.make)} ${esc(b.model)}</p>
            <p class="machine-card-meta">${b.year || '—'}${b.engine_cc ? ' · ' + b.engine_cc + ' cc' : ''}</p>
            ${b.description ? `<p class="machine-card-desc line-clamp-2">${esc(b.description)}</p>` : ''}
            <div class="machine-card-foot">
              <span></span>
              <a href="/bikes.html" class="btn-subtle">Manage</a>
            </div>
          </div>
        </article>`).join('') + '</div>'
    }
    async function renderTrips(panel) {
      if (!cache.trips) {
        const { data } = await supabase.from('trips')
          .select('id, title, start_loc, end_loc, distance_km, trip_date, difficulty, is_public, created_at')
          .eq('user_id', me.id).order('trip_date', { ascending: false, nullsFirst: false }).order('created_at', { ascending: false })
        cache.trips = data || []
      }
      if (!cache.trips.length) {
        panel.innerHTML = `<div class="card card-body-loose empty-state">
          <p class="empty-title">No routes in the ledger.</p>
          <p class="empty-body">Every long road begins as an intention.</p>
          <a href="/trips.html" class="btn btn-primary mt-6" style="margin:24px auto 0">Plan a route</a>
        </div>`
        return
      }
      panel.innerHTML = '<div class="grid-trips">' + cache.trips.map(t => {
        const date = t.trip_date ? new Date(t.trip_date).toLocaleDateString(undefined, { day:'numeric', month:'short', year:'numeric' }) : '—'
        return `<article class="route-card fade-up">
          <div class="row row-between" style="align-items:flex-start;gap:12px">
            <div class="stack stack-1 min-w-0" style="flex:1">
              <p class="route-card-title">${esc(t.title)}</p>
              <p class="route-card-route">${esc(t.start_loc || '—')} <span class="arrow">→</span> ${esc(t.end_loc || '—')} · ${date}</p>
            </div>
            <span class="badge badge-brass">${esc(t.difficulty || 'Medium')}</span>
          </div>
          <div class="rule" style="margin:14px 0"></div>
          <div class="row row-between" style="font-size:12.5px;color:var(--c-text-2)">
            <span>${t.distance_km ? t.distance_km + ' km' : '— km'}<span class="sep" style="margin:0 6px;color:var(--c-text-4)">·</span>${t.is_public ? 'public' : 'private'}</span>
            <a href="/trips.html" class="btn-subtle">Manage</a>
          </div>
        </article>`
      }).join('') + '</div>'
    }

    loadProfile()
    renderTab()
  </script>
</body>
</html>
