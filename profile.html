<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dossier · Bikers Portal</title>
  <link rel="icon" href="/assets/logo.svg" type="image/svg+xml" />
  <script src="./js/app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./assets/style.css" />
</head>
<body class="min-h-screen bg-ink-900 text-bone font-sans antialiased">

  <script type="module" src="./js/auth-guard.js"></script>

  <header id="bp-navbar" data-active=""></header>

  <main class="max-w-5xl mx-auto px-4 md:px-6 py-8 md:py-12">
    <!-- Dossier header -->
    <section class="bp-card p-6 md:p-8 bp-stitched">
      <div class="flex flex-col md:flex-row md:items-start gap-6">
        <div id="bigAvatar" class="skeleton rounded-full shrink-0 mx-auto md:mx-0" style="width:112px;height:112px"></div>
        <div class="flex-1 min-w-0 text-center md:text-left">
          <p class="bp-section-label mb-2" id="dossierLabel" style="justify-content:center">Rider Dossier</p>
          <h1 id="dName" class="font-serif text-[26px] md:text-[30px] text-bone">…</h1>
          <p id="dHandle" class="text-bone-dim text-[13px] mt-1">…</p>
          <p id="dBio" class="text-bone-muted text-[14px] mt-4 max-w-xl leading-relaxed">…</p>
          <div class="mt-4 flex items-center gap-2 justify-center md:justify-start flex-wrap">
            <span id="dBike" class="bp-badge" style="color:#c9a875;border-color:rgba(201,168,117,0.4);background:rgba(176,141,87,0.08)">—</span>
          </div>
        </div>
        <div class="flex md:flex-col gap-2 justify-center md:justify-start">
          <button id="editBtn"  class="bp-btn bp-btn-primary text-[13px]">Edit Profile</button>
          <button id="shareBtn" class="bp-btn bp-btn-ghost text-[13px]">Share Profile</button>
        </div>
      </div>

      <div class="bp-divider-double mt-7"></div>

      <div class="grid grid-cols-3 gap-4 mt-6 text-center">
        <div><p id="statPosts" class="font-serif text-[24px] text-bone">0</p><p class="text-bone-dim text-[10.5px] tracking-[0.22em] uppercase">Posts</p></div>
        <div><p id="statBikes" class="font-serif text-[24px] text-bone">0</p><p class="text-bone-dim text-[10.5px] tracking-[0.22em] uppercase">Bikes</p></div>
        <div><p id="statTrips" class="font-serif text-[24px] text-bone">0</p><p class="text-bone-dim text-[10.5px] tracking-[0.22em] uppercase">Trips</p></div>
      </div>
    </section>

    <!-- Edit panel -->
    <section id="editPanel" class="hidden mt-6">
      <form id="editForm" class="bp-card p-5 md:p-7" novalidate>
        <div class="flex items-center justify-between mb-5">
          <p class="bp-section-label" style="justify-content:flex-start">Edit Dossier</p>
          <button type="button" id="editCancel" class="bp-btn-subtle">Close</button>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-[auto_1fr] gap-5 items-start">
          <div>
            <label class="bp-label">Avatar</label>
            <div id="editAvatarPreview" class="skeleton rounded-full" style="width:80px;height:80px"></div>
            <label class="bp-btn bp-btn-ghost cursor-pointer mt-2 text-[12px]">
              <span>Choose image</span>
              <input id="editAvatarFile" type="file" accept="image/*" class="hidden" />
            </label>
            <p class="bp-msg bp-msg-error hidden" data-err="avatar"></p>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div><label class="bp-label">Full Name</label><input name="full_name" class="bp-input" /><p class="bp-msg bp-msg-error hidden" data-err="full_name"></p></div>
            <div><label class="bp-label">Username</label><input name="username" class="bp-input" /><p class="bp-msg bp-msg-error hidden" data-err="username"></p></div>
            <div class="sm:col-span-2"><label class="bp-label">Bio</label><textarea name="bio" rows="3" class="bp-textarea" placeholder="A line or two about your road."></textarea></div>
            <div class="sm:col-span-2"><label class="bp-label">Preferred Machine</label><input name="bike_model" class="bp-input" placeholder="e.g. Royal Enfield Interceptor 650" /></div>
          </div>
        </div>
        <p id="editErr" class="bp-msg bp-msg-error hidden mt-3"></p>
        <div class="flex justify-end gap-2 mt-5">
          <button type="button" id="editCancel2" class="bp-btn bp-btn-ghost">Cancel</button>
          <button type="submit" id="editSubmit" class="bp-btn bp-btn-primary"><span class="btn-label">Save dossier</span></button>
        </div>
      </form>
    </section>

    <!-- Tabs -->
    <section class="mt-10">
      <div class="flex items-center gap-1 border-b border-bronze">
        <button class="bp-tab is-on" data-tab="posts">My Posts</button>
        <button class="bp-tab"        data-tab="bikes">My Bikes</button>
        <button class="bp-tab"        data-tab="trips">My Trips</button>
      </div>
      <div id="tabPanel" class="mt-6 min-h-[160px]"></div>
    </section>
  </main>

  <script type="module">
    import { supabase } from './js/supabase.js'
    const { esc, timeAgo, avatarHTML, toast } = window.bp
    const confirmModal = window.bp.confirm

    const me = window.__bpUser
    let profile = null
    let activeTab = 'posts'
    const cache = { posts: null, bikes: null, trips: null }

    /* ── Paint dossier ─────────────────────────────────── */
    async function loadProfile() {
      profile = await window.bp.loadCurrentProfile()
      paintDossier()
      paintStats()
    }
    function paintDossier() {
      const av = document.getElementById('bigAvatar')
      av.outerHTML = avatarHTML(profile.avatar_url, profile.full_name || profile.username, 112)
      document.getElementById('dName').textContent   = profile.full_name || 'Rider'
      document.getElementById('dHandle').textContent = '@' + (profile.username || 'rider')
      const bio = profile.bio && profile.bio.trim()
      document.getElementById('dBio').textContent = bio || 'No introduction yet — share a line or two about your road.'
      const dBike = document.getElementById('dBike')
      dBike.textContent = profile.bike_model ? 'Machine — ' + profile.bike_model : 'No machine listed'
      // edit preview
      const ep = document.getElementById('editAvatarPreview')
      ep.outerHTML = avatarHTML(profile.avatar_url, profile.full_name || profile.username, 80)
      // fill form
      const f = document.getElementById('editForm')
      f.full_name.value = profile.full_name || ''
      f.username.value  = profile.username || ''
      f.bio.value       = profile.bio || ''
      f.bike_model.value= profile.bike_model || ''
    }
    async function paintStats() {
      const [pc, bc, tc] = await Promise.all([
        supabase.from('posts').select('id', { count: 'exact', head: true }).eq('user_id', me.id),
        supabase.from('bikes').select('id', { count: 'exact', head: true }).eq('user_id', me.id),
        supabase.from('trips').select('id', { count: 'exact', head: true }).eq('user_id', me.id),
      ])
      document.getElementById('statPosts').textContent = pc.count || 0
      document.getElementById('statBikes').textContent = bc.count || 0
      document.getElementById('statTrips').textContent = tc.count || 0
    }

    /* ── Edit panel ────────────────────────────────────── */
    const editPanel = document.getElementById('editPanel')
    document.getElementById('editBtn').addEventListener('click', () => editPanel.classList.remove('hidden'))
    document.getElementById('editCancel').addEventListener('click', () => editPanel.classList.add('hidden'))
    document.getElementById('editCancel2').addEventListener('click', () => editPanel.classList.add('hidden'))
    const editAvatarFile = document.getElementById('editAvatarFile')
    let editAvatarObj = null
    editAvatarFile.addEventListener('change', () => {
      const f = editAvatarFile.files && editAvatarFile.files[0]
      if (!f) return
      if (f.size > 1.5 * 1024 * 1024) {
        const el = document.querySelector('[data-err=avatar]')
        el.textContent = 'Avatar must be under 1.5 MB.'; el.classList.remove('hidden'); return
      }
      const url = URL.createObjectURL(f)
      const ep = document.getElementById('editAvatarPreview')
      ep.outerHTML = `<img id="editAvatarPreview" src="${url}" alt="" class="rounded-full object-cover border border-bronze" style="width:80px;height:80px" />`
      editAvatarObj = f
    })

    document.getElementById('editForm').addEventListener('submit', async (e) => {
      e.preventDefault()
      const f = e.target
      const errEl = document.getElementById('editErr')
      errEl.classList.add('hidden')
      f.querySelectorAll('[data-err]').forEach(el => el.classList.add('hidden'))
      const full_name = f.full_name.value.trim()
      const username  = f.username.value.trim()
      const bio       = f.bio.value.trim()
      const bike_model= f.bike_model.value.trim()
      let bad = false
      if (!full_name) { const el=f.querySelector('[data-err=full_name]'); el.textContent='Enter your name.'; el.classList.remove('hidden'); bad=true }
      if (!username)  { const el=f.querySelector('[data-err=username]');  el.textContent='Pick a username.'; el.classList.remove('hidden'); bad=true }
      else if (!/^[a-zA-Z0-9_]{3,20}$/.test(username)) { const el=f.querySelector('[data-err=username]'); el.textContent='3–20 chars: letters, numbers, underscore.'; el.classList.remove('hidden'); bad=true }
      if (bad) return

      const submit = document.getElementById('editSubmit')
      submit.disabled = true
      submit.innerHTML = '<span class="spinner"></span><span class="btn-label">Saving</span>'
      try {
        let avatar_url = profile.avatar_url || null
        if (editAvatarObj) {
          const ext = (editAvatarObj.type.split('/')[1] || 'jpg').replace('jpeg','jpg')
          const path = `${me.id}/avatar-${Date.now()}.${ext}`
          const { error: upErr } = await supabase.storage.from('avatars').upload(path, editAvatarObj, { upsert: true, contentType: editAvatarObj.type })
          if (upErr) throw upErr
          const { data: pub } = supabase.storage.from('avatars').getPublicUrl(path)
          avatar_url = pub.publicUrl
        }
        const { error } = await supabase.from('profiles').update({
          full_name, username, bio, bike_model, avatar_url,
        }).eq('id', me.id)
        if (error) throw error
        // update cached profile
        profile = { ...profile, full_name, username, bio, bike_model, avatar_url }
        window.bp.currentProfile = profile
        toast('Dossier updated.', 'success')
        editPanel.classList.add('hidden')
        paintDossier()
        editAvatarObj = null
      } catch (err) {
        const msg = (err && err.message) || ''
        if (/duplicate|unique/i.test(msg) && /username/i.test(msg)) {
          const el = f.querySelector('[data-err=username]')
          el.textContent = 'That username is already taken.'; el.classList.remove('hidden')
        } else {
          errEl.textContent = msg || 'Couldn’t save.'; errEl.classList.remove('hidden')
        }
      } finally {
        submit.disabled = false
        submit.innerHTML = '<span class="btn-label">Save dossier</span>'
      }
    })

    /* ── Share button (placeholder) ────────────────────── */
    document.getElementById('shareBtn').addEventListener('click', async () => {
      const url = window.location.href
      try { await navigator.clipboard.writeText(url); toast('Profile link copied.', 'success') }
      catch (_) { toast('Couldn’t copy link.', 'error') }
    })

    /* ── Tabs ──────────────────────────────────────────── */
    document.querySelectorAll('.bp-tab').forEach(b => {
      b.addEventListener('click', () => {
        document.querySelectorAll('.bp-tab').forEach(x => x.classList.remove('is-on'))
        b.classList.add('is-on')
        activeTab = b.getAttribute('data-tab')
        renderTab()
      })
    })
    async function renderTab() {
      const panel = document.getElementById('tabPanel')
      panel.innerHTML = `<div class="space-y-3"><div class="skeleton h-20"></div><div class="skeleton h-20"></div></div>`
      if (activeTab === 'posts')      return renderPosts(panel)
      if (activeTab === 'bikes')      return renderBikes(panel)
      if (activeTab === 'trips')      return renderTrips(panel)
    }
    async function renderPosts(panel) {
      if (!cache.posts) {
        const { data } = await supabase.from('posts')
          .select('id, content, image_url, created_at')
          .eq('user_id', me.id).order('created_at', { ascending: false })
        cache.posts = data || []
      }
      if (!cache.posts.length) {
        panel.innerHTML = `<div class="bp-card p-10 text-center"><p class="font-serif text-[18px] text-bone">No entries yet.</p><p class="text-bone-muted text-[13px] mt-2">The journal is waiting for your first mark.</p></div>`
        return
      }
      panel.innerHTML = '<div class="space-y-3">' + cache.posts.map(p => `
        <article class="bp-card p-4" data-post="${esc(p.id)}">
          <p class="text-bone text-[13.5px] leading-relaxed whitespace-pre-wrap">${esc(p.content)}</p>
          ${p.image_url ? `<img src="${esc(p.image_url)}" class="mt-3 w-full rounded-md border border-bronze max-h-72 object-cover" alt="" />` : ''}
          <div class="mt-3 pt-3 border-t border-bronze flex items-center justify-between text-[12px] text-bone-dim">
            <span>${timeAgo(p.created_at)}</span>
            <button data-act="delete" class="bp-btn-subtle text-burgundy">Remove</button>
          </div>
        </article>`).join('') + '</div>'
      panel.querySelectorAll('[data-act=delete]').forEach(b => b.addEventListener('click', async (e) => {
        const card = e.target.closest('[data-post]')
        const id = card.getAttribute('data-post')
        const ok = await confirmModal('Remove this entry from the journal?', 'Remove entry')
        if (!ok) return
        await supabase.from('comments').delete().eq('post_id', id)
        await supabase.from('likes').delete().eq('post_id', id)
        const { error } = await supabase.from('posts').delete().eq('id', id).eq('user_id', me.id)
        if (error) { toast('Couldn’t remove entry.', 'error'); return }
        cache.posts = null
        toast('Entry removed.', 'success')
        paintStats()
        renderTab()
      }))
    }
    async function renderBikes(panel) {
      if (!cache.bikes) {
        const { data } = await supabase.from('bikes')
          .select('id, make, model, year, engine_cc, color, description, photo_url, created_at')
          .eq('user_id', me.id).order('created_at', { ascending: false })
        cache.bikes = data || []
      }
      if (!cache.bikes.length) {
        panel.innerHTML = `<div class="bp-card p-10 text-center"><p class="font-serif text-[18px] text-bone">No machines in the registry.</p><p class="text-bone-muted text-[13px] mt-2">Add your first machine from the garage page.</p><a href="/bikes.html" class="bp-btn bp-btn-primary mt-5 inline-flex">Add a machine</a></div>`
        return
      }
      panel.innerHTML = '<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">' + cache.bikes.map(b => `
        <article class="bp-card overflow-hidden flex" data-bike="${esc(b.id)}">
          <div class="w-28 shrink-0 bg-ink-700 border-r border-bronze">
            ${b.photo_url ? `<img src="${esc(b.photo_url)}" class="w-full h-full object-cover" alt="" />` : `<div class="w-full h-full min-h-[112px] flex items-center justify-center text-bone-dim"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.4"><circle cx="6" cy="17" r="3"/><circle cx="18" cy="17" r="3"/><path d="M9 17h6l2-7H7l-1 4M5 10h14"/></svg></div>`}
          </div>
          <div class="p-3 flex-1 min-w-0 flex flex-col">
            <p class="font-serif text-bone text-[14.5px] truncate">${esc(b.make)} ${esc(b.model)}</p>
            <p class="text-bone-dim text-[11.5px]">${b.year || '—'}${b.engine_cc ? ' · ' + b.engine_cc + ' cc' : ''}</p>
            ${b.description ? `<p class="text-bone-muted text-[12.5px] mt-1.5 line-clamp-2">${esc(b.description)}</p>` : ''}
            <div class="mt-auto pt-2 flex items-center justify-end gap-1">
              <a href="/bikes.html" class="bp-btn-subtle">Manage</a>
            </div>
          </div>
        </article>`).join('') + '</div>'
    }
    async function renderTrips(panel) {
      if (!cache.trips) {
        const { data } = await supabase.from('trips')
          .select('id, title, start_loc, end_loc, distance_km, trip_date, difficulty, is_public, created_at')
          .eq('user_id', me.id).order('trip_date', { ascending: false, nullsFirst: false }).order('created_at', { ascending: false })
        cache.trips = data || []
      }
      if (!cache.trips.length) {
        panel.innerHTML = `<div class="bp-card p-10 text-center"><p class="font-serif text-[18px] text-bone">No routes in the ledger.</p><p class="text-bone-muted text-[13px] mt-2">Every long road begins as an intention.</p><a href="/trips.html" class="bp-btn bp-btn-primary mt-5 inline-flex">Plan a route</a></div>`
        return
      }
      panel.innerHTML = '<div class="space-y-3">' + cache.trips.map(t => {
        const diff = (t.difficulty || 'Medium').toLowerCase()
        const date = t.trip_date ? new Date(t.trip_date).toLocaleDateString(undefined, { day:'numeric', month:'short', year:'numeric' }) : '—'
        return `<article class="bp-card p-4">
          <div class="flex items-start justify-between gap-3">
            <div class="min-w-0">
              <p class="font-serif text-bone text-[15.5px] truncate">${esc(t.title)}</p>
              <p class="text-bone-dim text-[12px] mt-0.5">${esc(t.start_loc || '—')} → ${esc(t.end_loc || '—')} · ${date}</p>
            </div>
            <span class="bp-badge bp-badge-${diff}">${esc(t.difficulty || 'Medium')}</span>
          </div>
          <div class="bp-divider my-3"></div>
          <div class="flex items-center justify-between text-[12.5px] text-bone-muted">
            <span>${t.distance_km ? t.distance_km + ' km' : '— km'}${t.is_public ? ' · public' : ' · private'}</span>
            <a href="/trips.html" class="bp-btn-subtle">Manage</a>
          </div>
        </article>`
      }).join('') + '</div>'
    }

    // small tab style injected via tailwind classes won't be auto; add a quick class
    const styleEl = document.createElement('style')
    styleEl.textContent = `
      .bp-tab { padding: 10px 14px; color: #8a7e6a; font-size: 12.5px; letter-spacing: 0.16em; text-transform: uppercase; border-bottom: 1px solid transparent; margin-bottom: -1px; }
      .bp-tab:hover { color: #c7b9a2; }
      .bp-tab.is-on { color: #f3ede3; border-bottom-color: #b08d57; }`
    document.head.appendChild(styleEl)

    loadProfile()
    renderTab()
  </script>
</body>
</html>
