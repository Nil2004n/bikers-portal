<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dossier · Bikers Portal</title>
  <link rel="icon" href="/assets/logo.svg" type="image/svg+xml" />
  <script src="./js/app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./assets/style.css" />
  <style>
    /* ── Profile follow components ─────────────────────── */
    .profile-actions {
      display: flex; gap: 8px; flex-shrink: 0; align-items: center; flex-wrap: wrap;
    }
    .follow-btn { transition: transform var(--t-fast); }
    .follow-btn.pop { animation: followPop 220ms cubic-bezier(0.16, 1, 0.3, 1); }
    @keyframes followPop { 0% { transform: scale(1); } 50% { transform: scale(0.95); } 100% { transform: scale(1); } }
    .follow-btn .btn-label { transition: opacity 100ms ease; }
    .follow-btn.is-swapping .btn-label { opacity: 0; }
    .follow-actions { display: inline-flex; gap: 6px; }

    /* ── Pending requests panel ────────────────────────── */
    .pending-panel {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      margin-top: 32px;
    }
    .pending-head {
      width: 100%;
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 24px;
      background: transparent;
      border: 0;
      cursor: pointer;
      text-align: left;
    }
    .pending-head .head-label {
      display: inline-flex; align-items: center; gap: 12px;
      font-family: var(--font-body);
      font-size: 10.5px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--c-text-2);
      font-weight: 600;
    }
    .pending-head .head-label::before {
      content: ''; width: 24px; height: 1px; background: linear-gradient(90deg, transparent, var(--c-border-strong));
    }
    .pending-head .head-label::after {
      content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--c-border-strong), transparent);
    }
    .pending-head .head-caret {
      width: 28px; height: 28px;
      display: inline-flex; align-items: center; justify-content: center;
      color: var(--c-text-2);
      transition: transform var(--t-fast);
    }
    .pending-panel.is-open .pending-head .head-caret { transform: rotate(180deg); }
    .pending-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 380ms cubic-bezier(0.16, 1, 0.3, 1);
    }
    .pending-panel.is-open .pending-body { max-height: 1200px; }
    .pending-list { padding: 0 24px 20px; display: flex; flex-direction: column; gap: 12px; }
    .pending-row {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 14px;
      background: var(--c-bg);
      border: 1px solid var(--c-border);
      border-radius: var(--r-md);
      transition: opacity 280ms ease, transform 280ms ease;
    }
    .pending-row.is-leaving { opacity: 0; transform: translateY(-8px); }
    .pending-row-info { flex: 1; min-width: 0; }
    .pending-row-name { font-family: var(--font-display); font-size: 15px; color: var(--c-text); line-height: 1.2; font-weight: 500; }
    .pending-row-handle { font-size: 11.5px; color: var(--c-text-3); margin-top: 2px; letter-spacing: 0.02em; }

    /* ── Tabs row: horizontal scroll on small ─────────── */
    .tabs-scroll { overflow-x: auto; }
    .tabs-scroll .tabs { margin-bottom: 0; min-width: max-content; }

    /* ── Followers / Following grids ───────────────────── */
    .grid-people {
      display: grid; grid-template-columns: 1fr; gap: 14px;
    }
    @media (min-width: 640px) { .grid-people { grid-template-columns: 1fr 1fr; } }
    .people-card {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 18px;
    }
    .people-card-info { flex: 1; min-width: 0; }
    .people-card-name { font-family: var(--font-display); font-size: 15px; color: var(--c-text); line-height: 1.2; }
    .people-card-handle { font-size: 11.5px; color: var(--c-text-3); margin-top: 2px; }

    /* ── Mobile tuning ─────────────────────────────────── */
    @media (max-width: 768px) {
      .dossier-stats { grid-template-columns: repeat(2, 1fr) !important; gap: 16px !important; }
      .profile-actions { width: 100%; }
      .profile-actions .btn { flex: 1; }
    }
  </style>
</head>
<body>
  <script type="module" src="./js/auth-guard.js"></script>
  <header id="bp-navbar" data-active=""></header>

  <div class="founding-strip">
    Vol. III <span class="ornament">·</span> Dossier <span class="ornament">·</span> est. MMXXIV
  </div>

  <main class="page-narrow" style="padding-top:40px;padding-bottom:80px;max-width:920px">

    <!-- ░░ Dossier header ░░ -->
    <section class="dossier fade-up">
      <div class="dossier-head">
        <div id="bigAvatar" class="skeleton avatar avatar-xl avatar-ring" style="width:104px;height:104px"></div>
        <div class="dossier-meta" style="text-align:left">
          <p class="eyebrow eyebrow-brass" id="dossierLabel" style="display:block;margin-bottom:6px">Rider dossier</p>
          <h1 class="dossier-name" id="dName" style="font-style:italic">…</h1>
          <p class="dossier-handle" id="dHandle">…</p>
          <p class="dossier-bio" id="dBio">…</p>
          <div class="row row-2 mt-5" style="flex-wrap:wrap">
            <span id="dBike" class="badge badge-brass">—</span>
          </div>
        </div>
        <div class="dossier-actions profile-actions">
          <button id="editBtn"  class="btn btn-primary btn-sm hidden">Edit dossier</button>
          <button id="shareBtn" class="btn btn-ghost btn-sm">Share profile</button>
          <div id="followWrap" class="hidden">
            <button id="followBtn" class="btn btn-primary btn-sm follow-btn" data-state="none">
              <span class="btn-label">Follow +</span>
            </button>
          </div>
        </div>
      </div>

      <div class="dossier-stats">
        <div class="stat"><span id="statPosts" class="stat-value">0</span><span class="stat-label">Posts</span></div>
        <div class="stat"><span id="statBikes" class="stat-value">0</span><span class="stat-label">Machines</span></div>
        <div class="stat"><span id="statTrips" class="stat-value">0</span><span class="stat-label">Routes</span></div>
        <div class="stat"><span id="statFollowers" class="stat-value">0</span><span class="stat-label">Followers</span></div>
        <div class="stat"><span id="statFollowing" class="stat-value">0</span><span class="stat-label">Following</span></div>
      </div>
    </section>

    <!-- ░░ Edit panel ░░ -->
    <section id="editPanel" class="hidden mt-7">
      <form id="editForm" class="card card-body card-stitched" novalidate>
        <div class="row row-between mb-6" style="align-items:center">
          <p class="eyebrow eyebrow-brass">Edit dossier</p>
          <button type="button" id="editCancel" class="btn-subtle">Close</button>
        </div>

        <div class="grid-editform">
          <div class="field" style="grid-row:1 / 3">
            <label class="field-label">Avatar</label>
            <div id="editAvatarPreview" class="skeleton avatar avatar-xl avatar-ring" style="width:88px;height:88px"></div>
            <label class="btn btn-ghost btn-sm mt-3" style="cursor:pointer;width:100%">
              <span>Choose image</span>
              <input id="editAvatarFile" type="file" accept="image/*" class="sr-only" />
            </label>
            <p class="field-hint mt-2" style="font-size:11px">Under 1.5 MB.</p>
            <p class="field-error hidden" data-err="avatar"></p>
          </div>

          <div class="field">
            <label class="field-label">Full name</label>
            <input name="full_name" class="input" />
            <p class="field-error hidden" data-err="full_name"></p>
          </div>
          <div class="field">
            <label class="field-label">Username</label>
            <input name="username" class="input" />
            <p class="field-error hidden" data-err="username"></p>
          </div>
          <div class="field" style="grid-column:2 / -1">
            <label class="field-label">Bio</label>
            <textarea name="bio" rows="3" class="textarea" placeholder="A line or two about your road."></textarea>
          </div>
          <div class="field" style="grid-column:2 / -1">
            <label class="field-label">Preferred machine</label>
            <input name="bike_model" class="input" placeholder="e.g. Royal Enfield Interceptor 650" />
          </div>
        </div>

        <p id="editErr" class="msg msg-error hidden mt-4"></p>

        <div class="row row-end gap-3 mt-6">
          <button type="button" id="editCancel2" class="btn btn-ghost">Cancel</button>
          <button type="submit" id="editSubmit" class="btn btn-primary"><span class="btn-label">Save dossier</span></button>
        </div>
      </form>
    </section>

    <!-- ░░ Pending requests panel (own profile only) ░░ -->
    <section id="pendingPanel" class="pending-panel hidden">
      <button class="pending-head" id="pendingToggle" aria-expanded="false">
        <span class="head-label">Pending requests <span class="badge badge-brass" id="pendingCount" style="margin-left:8px">0</span></span>
        <span class="head-caret">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
        </span>
      </button>
      <div class="pending-body">
        <div id="pendingList" class="pending-list"></div>
      </div>
    </section>

    <!-- ░░ Tabs ░░ -->
    <section class="mt-9">
      <div class="tabs-scroll">
        <div class="tabs">
          <button class="tab is-on" data-tab="posts">My posts</button>
          <button class="tab"        data-tab="bikes">My machines</button>
          <button class="tab"        data-tab="trips">My routes</button>
          <button class="tab"        data-tab="followers">Followers</button>
          <button class="tab"        data-tab="following">Following</button>
        </div>
      </div>
      <div id="tabPanel" class="tab-panel" style="min-height:160px"></div>
    </section>
  </main>

  <style>
    .grid-editform {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }
    @media (min-width: 640px) {
      .grid-editform { grid-template-columns: auto 1fr; gap: 18px 24px; }
    }
    @media (max-width: 1023px) {
      .grid-machines { grid-template-columns: 1fr 1fr; gap: 16px; }
    }
    @media (max-width: 639px) {
      .grid-machines { grid-template-columns: 1fr; }
    }
  </style>

  <script type="module">
    import { supabase } from './js/supabase.js'
    import {
      sendFollowRequest, cancelFollowRequest, acceptFollowRequest, rejectFollowRequest,
      unfollowUser, getFollowStatus, getFollowerCount, getFollowingCount,
      getFollowersList, getFollowingList, getPendingRequests,
    } from './js/follow.js'

    const { esc, timeAgo, avatarHTML, toast } = window.bp
    const confirmModal = window.bp.confirm

    const me = window.__bpUser
    const urlParams = new URLSearchParams(window.location.search)
    const profileId = urlParams.get('user') || me.id
    const isOwn = profileId === me.id

    let profile = null
    let activeTab = 'posts'
    const cache = { posts: null, bikes: null, trips: null, followers: null, following: null }
    const inFlight = new Set()

    /* ── Load profile + side data ──────────────────────── */
    async function loadProfile() {
      if (isOwn) {
        profile = await window.bp.loadCurrentProfile()
      } else {
        const { data, error } = await supabase.from('profiles')
          .select('id, username, full_name, avatar_url, bike_model, bio, created_at')
          .eq('id', profileId).maybeSingle()
        if (error || !data) {
          toast('Rider not found.', 'error')
          return
        }
        profile = data
      }
      paintDossier()
      paintStats()
      paintProfileActions()
      if (isOwn) await loadPendingPanel()
    }

    function paintDossier() {
      const av = document.getElementById('bigAvatar')
      av.outerHTML = avatarHTML(profile.avatar_url, profile.full_name || profile.username, 104)
      document.getElementById('dName').textContent   = profile.full_name || 'Rider'
      document.getElementById('dHandle').textContent = '@' + (profile.username || 'rider')
      const bio = profile.bio && profile.bio.trim()
      document.getElementById('dBio').textContent = bio || (isOwn
        ? 'No introduction yet — share a line or two about your road.'
        : 'This rider hasn’t written a bio yet.')
      const dBike = document.getElementById('dBike')
      dBike.textContent = profile.bike_model ? 'Machine — ' + profile.bike_model : 'No machine listed'
      document.getElementById('dossierLabel').textContent = isOwn ? 'Rider dossier' : 'Rider'

      if (isOwn) {
        const ep = document.getElementById('editAvatarPreview')
        ep.outerHTML = avatarHTML(profile.avatar_url, profile.full_name || profile.username, 88)
        const f = document.getElementById('editForm')
        f.full_name.value = profile.full_name || ''
        f.username.value  = profile.username || ''
        f.bio.value       = profile.bio || ''
        f.bike_model.value= profile.bike_model || ''
      }
    }

    function paintProfileActions() {
      const editBtn   = document.getElementById('editBtn')
      const followWrap= document.getElementById('followWrap')
      if (isOwn) {
        editBtn.classList.remove('hidden')
        followWrap.classList.add('hidden')
      } else {
        editBtn.classList.add('hidden')
        followWrap.classList.remove('hidden')
        paintFollowBtn()
      }
    }

    async function paintFollowBtn() {
      const status = await getFollowStatus(profile.id)
      const btn = document.getElementById('followBtn')
      renderFollowBtn(btn, status, profile.id, 'profile')
    }

    function renderFollowBtn(btn, status, targetId, context) {
      const label = btn.querySelector('.btn-label')
      if (status === 'accepted') {
        btn.className = 'btn btn-ghost btn-sm follow-btn'
        btn.setAttribute('data-state', 'accepted')
        if (label) label.textContent = 'Following'
      } else if (status === 'pending_sent') {
        btn.className = 'btn btn-ghost btn-sm follow-btn'
        btn.setAttribute('data-state', 'pending_sent')
        if (label) label.textContent = 'Requested'
      } else {
        btn.className = 'btn btn-primary btn-sm follow-btn'
        btn.setAttribute('data-state', 'none')
        if (label) label.textContent = 'Follow +'
      }
    }

    async function paintStats() {
      const postsQuery = supabase.from('posts').select('id', { count: 'exact', head: true }).eq('user_id', profile.id)
      const bikesQuery = supabase.from('bikes').select('id', { count: 'exact', head: true }).eq('user_id', profile.id)
      const tripsQuery = supabase.from('trips').select('id', { count: 'exact', head: true }).eq('user_id', profile.id)
      const [pc, bc, tc, followers, following] = await Promise.all([
        postsQuery, bikesQuery, tripsQuery,
        getFollowerCount(profile.id), getFollowingCount(profile.id),
      ])
      const paint = (id, n) => {
        const el = document.getElementById(id)
        if (!el) return
        el.textContent = n || 0
        el.classList.remove('count-pop'); void el.offsetWidth; el.classList.add('count-pop')
      }
      paint('statPosts', pc.count)
      paint('statBikes', bc.count)
      paint('statTrips', tc.count)
      paint('statFollowers', followers)
      paint('statFollowing', following)
    }

    /* ── Pending panel ─────────────────────────────────── */
    async function loadPendingPanel() {
      const list = await getPendingRequests()
      const panel = document.getElementById('pendingPanel')
      const countEl = document.getElementById('pendingCount')
      countEl.textContent = list.length
      if (!list.length) { panel.classList.add('hidden'); return }
      panel.classList.remove('hidden')
      panel.classList.add('is-open')
      document.getElementById('pendingToggle').setAttribute('aria-expanded', 'true')
      const host = document.getElementById('pendingList')
      host.innerHTML = list.map(req => pendingRowHTML(req)).join('') || `<p class="empty-body" style="color:var(--c-text-3);font-style:italic">No requests.</p>`
    }
    function pendingRowHTML(req) {
      const p = req.profile
      if (!p) return ''
      return `
        <div class="pending-row" data-req="${esc(req.id)}" data-follower="${esc(req.follower_id)}">
          ${avatarHTML(p.avatar_url, p.full_name || p.username, 32)}
          <div class="pending-row-info min-w-0">
            <p class="pending-row-name truncate">${esc(p.full_name || p.username)}</p>
            <p class="pending-row-handle truncate">@${esc(p.username || 'rider')}${p.bike_model ? ' · ' + esc(p.bike_model) : ''}</p>
          </div>
          <div class="follow-actions">
            <button class="btn btn-primary btn-sm" data-act="accept-req" data-follower="${esc(req.follower_id)}" data-row="${esc(req.id)}"><span class="btn-label">Accept</span></button>
            <button class="btn btn-ghost btn-sm" data-act="decline-req" data-follower="${esc(req.follower_id)}" data-row="${esc(req.id)}"><span class="btn-label">Decline</span></button>
          </div>
        </div>`
    }
    document.getElementById('pendingToggle').addEventListener('click', () => {
      const p = document.getElementById('pendingPanel')
      p.classList.toggle('is-open')
      document.getElementById('pendingToggle').setAttribute('aria-expanded', String(p.classList.contains('is-open')))
    })
    document.getElementById('pendingList').addEventListener('click', async (e) => {
      const btn = e.target.closest('button[data-act]')
      if (!btn) return
      const act = btn.getAttribute('data-act')
      const rowId = btn.getAttribute('data-row')
      const follower = btn.getAttribute('data-follower')
      const row = document.querySelector(`[data-req="${rowId}"]`)
      if (inFlight.has(rowId)) return
      inFlight.add(rowId)
      btn.disabled = true
      try {
        if (act === 'accept-req') {
          const r = await acceptFollowRequest(follower)
          if (!r.success) throw new Error(r.error)
        } else {
          const r = await rejectFollowRequest(follower)
          if (!r.success) throw new Error(r.error)
        }
        if (row) { row.classList.add('is-leaving'); setTimeout(() => row.remove(), 320) }
        const countEl = document.getElementById('pendingCount')
        const next = Math.max(0, parseInt(countEl.textContent, 10) - 1)
        countEl.textContent = next
        // Bump followers count if accepted
        if (act === 'accept-req') bumpStat('statFollowers', +1)
        if (next === 0) {
          setTimeout(() => document.getElementById('pendingPanel').classList.add('hidden'), 380)
        }
        cache.followers = null
      } catch (err) {
        toast(err.message || 'Couldn’t update request.', 'error')
        btn.disabled = false
      } finally {
        inFlight.delete(rowId)
      }
    })

    function bumpStat(id, delta) {
      const el = document.getElementById(id)
      if (!el) return
      el.textContent = (parseInt(el.textContent, 10) || 0) + delta
      el.classList.remove('count-pop'); void el.offsetWidth; el.classList.add('count-pop')
    }

    /* ── Edit form (own profile only) ──────────────────── */
    if (isOwn) {
      const editPanel = document.getElementById('editPanel')
      document.getElementById('editBtn').addEventListener('click', () => editPanel.classList.remove('hidden'))
      document.getElementById('editCancel').addEventListener('click', () => editPanel.classList.add('hidden'))
      document.getElementById('editCancel2').addEventListener('click', () => editPanel.classList.add('hidden'))
      const editAvatarFile = document.getElementById('editAvatarFile')
      let editAvatarObj = null
      editAvatarFile.addEventListener('change', () => {
        const f = editAvatarFile.files && editAvatarFile.files[0]
        if (!f) return
        if (f.size > 1.5 * 1024 * 1024) {
          const el = document.querySelector('[data-err=avatar]')
          el.textContent = 'Avatar must be under 1.5 MB.'; el.classList.remove('hidden'); return
        }
        const url = URL.createObjectURL(f)
        const ep = document.getElementById('editAvatarPreview')
        ep.outerHTML = `<img id="editAvatarPreview" src="${url}" alt="" class="avatar avatar-xl" style="width:88px;height:88px;object-fit:cover;box-shadow:0 0 0 1px var(--c-brass-line), 0 0 0 4px var(--c-bg)" />`
        editAvatarObj = f
      })

      document.getElementById('editForm').addEventListener('submit', async (e) => {
        e.preventDefault()
        const f = e.target
        const errEl = document.getElementById('editErr')
        errEl.classList.add('hidden')
        f.querySelectorAll('[data-err]').forEach(el => el.classList.add('hidden'))
        const full_name = f.full_name.value.trim()
        const username  = f.username.value.trim()
        const bio       = f.bio.value.trim()
        const bike_model= f.bike_model.value.trim()
        let bad = false
        if (!full_name) { const el=f.querySelector('[data-err=full_name]'); el.textContent='Enter your name.'; el.classList.remove('hidden'); bad=true }
        if (!username)  { const el=f.querySelector('[data-err=username]');  el.textContent='Pick a username.'; el.classList.remove('hidden'); bad=true }
        else if (!/^[a-zA-Z0-9_]{3,20}$/.test(username)) { const el=f.querySelector('[data-err=username]'); el.textContent='3–20 chars: letters, numbers, underscore.'; el.classList.remove('hidden'); bad=true }
        if (bad) return

        const submit = document.getElementById('editSubmit')
        submit.disabled = true
        submit.innerHTML = '<span class="spinner"></span><span class="btn-label">Saving</span>'
        try {
          let avatar_url = profile.avatar_url || null
          if (editAvatarObj) {
            const ext = (editAvatarObj.type.split('/')[1] || 'jpg').replace('jpeg','jpg')
            const path = `${me.id}/avatar-${Date.now()}.${ext}`
            const { error: upErr } = await supabase.storage.from('avatars').upload(path, editAvatarObj, { upsert: true, contentType: editAvatarObj.type })
            if (upErr) throw upErr
            const { data: pub } = supabase.storage.from('avatars').getPublicUrl(path)
            avatar_url = pub.publicUrl
          }
          const { error } = await supabase.from('profiles').update({
            full_name, username, bio, bike_model, avatar_url,
          }).eq('id', me.id)
          if (error) throw error
          profile = { ...profile, full_name, username, bio, bike_model, avatar_url }
          window.bp.currentProfile = profile
          toast('Dossier updated.', 'success')
          editPanel.classList.add('hidden')
          paintDossier()
          editAvatarObj = null
        } catch (err) {
          const msg = (err && err.message) || ''
          if (/duplicate|unique/i.test(msg) && /username/i.test(msg)) {
            const el = f.querySelector('[data-err=username]')
            el.textContent = 'That username is already taken.'; el.classList.remove('hidden')
          } else {
            errEl.textContent = msg || 'Couldn’t save.'; errEl.classList.remove('hidden')
          }
        } finally {
          submit.disabled = false
          submit.innerHTML = '<span class="btn-label">Save dossier</span>'
        }
      })
    }

    document.getElementById('shareBtn').addEventListener('click', async () => {
      const url = window.location.href
      try { await navigator.clipboard.writeText(url); toast('Profile link copied.', 'success') }
      catch (_) { toast('Couldn’t copy link.', 'error') }
    })

    /* ── Follow button on profile ──────────────────────── */
    document.getElementById('followBtn').addEventListener('click', async (e) => {
      const btn = e.currentTarget
      const currentState = btn.getAttribute('data-state') || 'none'
      if (inFlight.has(profile.id)) return
      inFlight.add(profile.id)
      btn.disabled = true
      btn.classList.add('pop')
      setTimeout(() => btn.classList.remove('pop'), 240)
      try {
        if (currentState === 'none') {
          const r = await sendFollowRequest(profile.id)
          if (!r.success) throw new Error(r.error)
          renderFollowBtn(btn, 'pending_sent', profile.id, 'profile')
        } else if (currentState === 'pending_sent') {
          const r = await cancelFollowRequest(profile.id)
          if (!r.success) throw new Error(r.error)
          renderFollowBtn(btn, 'none', profile.id, 'profile')
        } else if (currentState === 'accepted') {
          const ok = await confirmModal('Unfollow this rider?', 'Unfollow')
          if (!ok) return
          const r = await unfollowUser(profile.id)
          if (!r.success) throw new Error(r.error)
          renderFollowBtn(btn, 'none', profile.id, 'profile')
        }
      } catch (err) {
        toast(err.message || 'Couldn’t update follow.', 'error')
        renderFollowBtn(btn, currentState, profile.id, 'profile')
      } finally {
        inFlight.delete(profile.id)
        btn.disabled = false
      }
    })

    /* ── Tabs ──────────────────────────────────────────── */
    document.querySelectorAll('.tab').forEach(b => {
      b.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('is-on'))
        b.classList.add('is-on')
        activeTab = b.getAttribute('data-tab')
        renderTab()
      })
    })
    async function renderTab() {
      const panel = document.getElementById('tabPanel')
      panel.classList.remove('tab-panel'); void panel.offsetWidth; panel.classList.add('tab-panel')
      panel.innerHTML = `<div class="stack stack-3"><div class="skeleton" style="height:80px"></div><div class="skeleton" style="height:80px"></div></div>`
      if (activeTab === 'posts')      return renderPosts(panel)
      if (activeTab === 'bikes')      return renderBikes(panel)
      if (activeTab === 'trips')      return renderTrips(panel)
      if (activeTab === 'followers')  return renderPeople(panel, 'followers')
      if (activeTab === 'following')  return renderPeople(panel, 'following')
    }
    async function renderPosts(panel) {
      if (!cache.posts) {
        const { data } = await supabase.from('posts')
          .select('id, content, image_url, created_at')
          .eq('user_id', profile.id).order('created_at', { ascending: false })
        cache.posts = data || []
      }
      if (!cache.posts.length) {
        panel.innerHTML = `<div class="card card-body-loose empty-state">
          <p class="empty-title">No entries yet.</p>
          <p class="empty-body">${isOwn ? 'The journal is waiting for your first mark.' : 'This rider has not published any entries.'}</p>
          ${isOwn ? '<a href="/feed.html" class="btn btn-primary mt-6" style="margin:24px auto 0">Open the journal</a>' : ''}
        </div>`
        return
      }
      panel.innerHTML = '<div class="stack stack-3">' + cache.posts.map(p => `
        <article class="feed-card fade-up" data-post="${esc(p.id)}">
          <p class="feed-card-body" style="margin:0">${esc(p.content)}</p>
          ${p.image_url ? `<img src="${esc(p.image_url)}" class="feed-card-image" alt="" />` : ''}
          <div class="feed-card-actions" style="border:0;padding:0;margin-top:12px;justify-content:space-between">
            <span style="font-size:11.5px;color:var(--c-text-3)">${timeAgo(p.created_at)}</span>
            ${isOwn ? '<button data-act="delete" class="btn-subtle" style="color:var(--c-error)">Remove</button>' : ''}
          </div>
        </article>`).join('') + '</div>'
      if (isOwn) {
        panel.querySelectorAll('[data-act=delete]').forEach(b => b.addEventListener('click', async (e) => {
          const card = e.target.closest('[data-post]')
          const id = card.getAttribute('data-post')
          const ok = await confirmModal('Remove this entry from the journal?', 'Remove entry')
          if (!ok) return
          await supabase.from('comments').delete().eq('post_id', id)
          await supabase.from('likes').delete().eq('post_id', id)
          const { error } = await supabase.from('posts').delete().eq('id', id).eq('user_id', me.id)
          if (error) { toast('Couldn’t remove entry.', 'error'); return }
          cache.posts = null
          toast('Entry removed.', 'success')
          paintStats()
          renderTab()
        }))
      }
    }
    async function renderBikes(panel) {
      if (!cache.bikes) {
        const { data } = await supabase.from('bikes')
          .select('id, make, model, year, engine_cc, color, description, photo_url, created_at')
          .eq('user_id', profile.id).order('created_at', { ascending: false })
        cache.bikes = data || []
      }
      if (!cache.bikes.length) {
        panel.innerHTML = `<div class="card card-body-loose empty-state">
          <p class="empty-title">No machines in the registry.</p>
          <p class="empty-body">${isOwn ? 'Add your first machine from the garage page.' : 'This rider has not registered any machines.'}</p>
          ${isOwn ? '<a href="/bikes.html" class="btn btn-primary mt-6" style="margin:24px auto 0">Add a machine</a>' : ''}
        </div>`
        return
      }
      panel.innerHTML = '<div class="grid-machines">' + cache.bikes.map(b => `
        <article class="machine-card fade-up" data-bike="${esc(b.id)}">
          <div class="machine-card-img">
            ${b.photo_url ? `<img src="${esc(b.photo_url)}" alt="" />` : `<div class="machine-card-img-placeholder"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.4"><circle cx="6" cy="17" r="3"/><circle cx="18" cy="17" r="3"/><path d="M9 17h6l2-7H7l-1 4M5 10h14"/></svg></div>`}
          </div>
          <div class="machine-card-body">
            <p class="machine-card-title">${esc(b.make)} ${esc(b.model)}</p>
            <p class="machine-card-meta">${b.year || '—'}${b.engine_cc ? ' · ' + b.engine_cc + ' cc' : ''}</p>
            ${b.description ? `<p class="machine-card-desc line-clamp-2">${esc(b.description)}</p>` : ''}
            <div class="machine-card-foot">
              <span></span>
              ${isOwn ? '<a href="/bikes.html" class="btn-subtle">Manage</a>' : ''}
            </div>
          </div>
        </article>`).join('') + '</div>'
    }
    async function renderTrips(panel) {
      if (!cache.trips) {
        const { data } = await supabase.from('trips')
          .select('id, title, start_loc, end_loc, distance_km, trip_date, difficulty, is_public, created_at')
          .eq('user_id', profile.id).order('trip_date', { ascending: false, nullsFirst: false }).order('created_at', { ascending: false })
        cache.trips = data || []
      }
      if (!cache.trips.length) {
        panel.innerHTML = `<div class="card card-body-loose empty-state">
          <p class="empty-title">No routes in the ledger.</p>
          <p class="empty-body">${isOwn ? 'Every long road begins as an intention.' : 'This rider has not planned any routes yet.'}</p>
          ${isOwn ? '<a href="/trips.html" class="btn btn-primary mt-6" style="margin:24px auto 0">Plan a route</a>' : ''}
        </div>`
        return
      }
      panel.innerHTML = '<div class="grid-trips">' + cache.trips.map(t => {
        const date = t.trip_date ? new Date(t.trip_date).toLocaleDateString(undefined, { day:'numeric', month:'short', year:'numeric' }) : '—'
        return `<article class="route-card fade-up">
          <div class="row row-between" style="align-items:flex-start;gap:12px">
            <div class="stack stack-1 min-w-0" style="flex:1">
              <p class="route-card-title">${esc(t.title)}</p>
              <p class="route-card-route">${esc(t.start_loc || '—')} <span class="arrow">→</span> ${esc(t.end_loc || '—')} · ${date}</p>
            </div>
            <span class="badge badge-brass">${esc(t.difficulty || 'Medium')}</span>
          </div>
          <div class="rule" style="margin:14px 0"></div>
          <div class="row row-between" style="font-size:12.5px;color:var(--c-text-2)">
            <span>${t.distance_km ? t.distance_km + ' km' : '— km'}<span class="sep" style="margin:0 6px;color:var(--c-text-4)">·</span>${t.is_public ? 'public' : 'private'}</span>
            ${isOwn ? '<a href="/trips.html" class="btn-subtle">Manage</a>' : ''}
          </div>
        </article>`
      }).join('') + '</div>'
    }

    async function renderPeople(panel, kind) {
      if (!cache[kind]) {
        cache[kind] = kind === 'followers' ? await getFollowersList(profile.id) : await getFollowingList(profile.id)
      }
      const list = cache[kind] || []
      if (!list.length) {
        const msg = kind === 'followers'
          ? (isOwn ? 'No followers yet.' : 'No followers yet.')
          : (isOwn ? 'Not following anyone yet.' : 'Not following anyone yet.')
        panel.innerHTML = `<div class="card card-body-loose empty-state">
          <p class="empty-title">${msg}</p>
        </div>`
        return
      }
      const meId = me.id
      const decorated = await Promise.all(list.map(async (p) => {
        const status = (p.id !== meId) ? await getFollowStatus(p.id) : 'none'
        return { ...p, __status: status }
      }))
      panel.innerHTML = '<div class="grid-people">' + decorated.map(p => peopleCardHTML(p, p.__status)).join('') + '</div>'
      panel.querySelectorAll('.follow-btn').forEach(btn => {
        btn.addEventListener('click', () => onPeopleFollow(btn))
      })
    }

    function peopleCardHTML(p, status) {
      const sid = `ppl-${p.id}`
      let action
      if (p.id === me.id) {
        action = ''
      } else if (status === 'accepted') {
        action = `<button class="btn btn-ghost btn-sm follow-btn" id="${sid}" data-target="${esc(p.id)}" data-state="accepted"><span class="btn-label">Following</span></button>`
      } else if (status === 'pending_sent') {
        action = `<button class="btn btn-ghost btn-sm follow-btn" id="${sid}" data-target="${esc(p.id)}" data-state="pending_sent"><span class="btn-label">Requested</span></button>`
      } else {
        action = `<button class="btn btn-primary btn-sm follow-btn" id="${sid}" data-target="${esc(p.id)}" data-state="none"><span class="btn-label">Follow +</span></button>`
      }
      return `
        <article class="card card-body-tight people-card fade-up">
          ${avatarHTML(p.avatar_url, p.full_name || p.username, 40)}
          <div class="people-card-info min-w-0">
            <p class="people-card-name truncate">${esc(p.full_name || p.username)}</p>
            <p class="people-card-handle truncate">@${esc(p.username || 'rider')}</p>
          </div>
          ${action}
        </article>`
    }

    async function onPeopleFollow(btn) {
      const target = btn.getAttribute('data-target')
      const currentState = btn.getAttribute('data-state') || 'none'
      if (inFlight.has(target)) return
      inFlight.add(target)
      btn.disabled = true
      try {
        let ns = currentState
        if (currentState === 'none')           { const r = await sendFollowRequest(target); if (!r.success) throw new Error(r.error); ns = 'pending_sent' }
        else if (currentState === 'pending_sent') { const r = await cancelFollowRequest(target); if (!r.success) throw new Error(r.error); ns = 'none' }
        else if (currentState === 'accepted')  { const r = await unfollowUser(target); if (!r.success) throw new Error(r.error); ns = 'none' }
        // refresh
        const fresh = await getFollowStatus(target)
        const parent = btn.parentElement
        parent.innerHTML = peopleCardHTML({ id: target }, fresh).match(/<button[\s\S]*?<\/button>/)[0]
        parent.querySelector('.follow-btn')?.addEventListener('click', e => onPeopleFollow(e.currentTarget))
      } catch (e) {
        toast(e.message || 'Couldn’t update follow.', 'error')
        btn.disabled = false
      } finally {
        inFlight.delete(target)
      }
    }

    loadProfile()
    renderTab()
  </script>
</body>
</html>
