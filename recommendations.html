<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Road Concierge · Bikers Portal</title>
  <link rel="icon" href="/assets/logo.svg" type="image/svg+xml" />
  <script src="./js/app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./assets/style.css" />
</head>
<body>
  <script type="module" src="./js/auth-guard.js"></script>
  <header id="bp-navbar" data-active="recommendations"></header>

  <div class="founding-strip">
    Vol. III <span class="ornament">·</span> The concierge <span class="ornament">·</span> est. MMXXIV
  </div>

  <main class="page-narrow" style="padding-top:40px;padding-bottom:80px">

    <header class="page-header" style="padding:24px 0 36px;text-align:center">
      <p class="eyebrow eyebrow-brass" style="margin-bottom:18px;justify-content:center;display:inline-flex">The concierge</p>
      <h1 style="font-family:var(--font-display);font-style:italic;font-weight:500;line-height:1.05;letter-spacing:-0.01em;text-align:center">
        Road Concierge
      </h1>
      <p class="lede" style="text-align:center;margin-left:auto;margin-right:auto">Refined route suggestions, considered by your appetite for distance, terrain, and temperament.</p>
    </header>

    <!-- Form -->
    <form id="conciergeForm" class="concierge-card page-enter" novalidate>

      <div class="row row-4 mb-6" style="align-items:flex-end;flex-wrap:wrap;gap:16px">
        <div class="field" style="flex:1;min-width:240px">
          <label class="field-label">Rider level</label>
          <div class="segmented">
            <input type="radio" name="riderLevel" id="rl-b" value="Beginner" /><label for="rl-b">Beginner</label>
            <input type="radio" name="riderLevel" id="rl-i" value="Intermediate" checked /><label for="rl-i">Intermediate</label>
            <input type="radio" name="riderLevel" id="rl-e" value="Expert" /><label for="rl-e">Expert</label>
          </div>
        </div>
        <div class="field" style="flex:1;min-width:200px">
          <label class="field-label" for="region">Region / state</label>
          <input id="region" class="input" placeholder="e.g. Karnataka" />
        </div>
      </div>

      <div class="field mb-6">
        <label class="field-label">Terrain preferences</label>
        <div id="terrains" class="row row-2" style="flex-wrap:wrap">
          <button type="button" class="chip" data-val="Highway">Highway</button>
          <button type="button" class="chip" data-val="Mountain">Mountain</button>
          <button type="button" class="chip" data-val="City">City</button>
          <button type="button" class="chip" data-val="Dirt">Dirt</button>
          <button type="button" class="chip" data-val="Touring">Touring</button>
          <button type="button" class="chip" data-val="Mixed">Mixed</button>
        </div>
      </div>

      <div class="field mb-6">
        <div class="row row-between" style="align-items:baseline;margin-bottom:8px">
          <label class="field-label" for="maxDist" style="margin:0">Max distance</label>
          <span id="distLabel" style="font-family:var(--font-display);font-size:20px;color:var(--c-text)">300 km</span>
        </div>
        <input id="maxDist" type="range" min="50" max="1200" step="25" value="300" class="range" />
        <div class="row row-between" style="font-size:10.5px;letter-spacing:0.18em;color:var(--c-text-3);text-transform:uppercase;margin-top:6px;font-weight:500">
          <span>50</span><span>400</span><span>800</span><span>1200</span>
        </div>
      </div>

      <div class="field mb-6">
        <label class="field-label" for="mood">Mood <span style="color:var(--c-text-3);text-transform:none;letter-spacing:0.02em;font-size:11px;font-weight:500">(optional)</span></label>
        <input id="mood" class="input" placeholder="calm · spirited · long-haul · scenic · technical" />
      </div>

      <p id="conErr" class="msg msg-error hidden" style="margin-bottom:16px"></p>

      <div class="row row-end">
        <button id="conSubmit" type="submit" class="btn btn-primary">
          <span class="btn-label">Consult the concierge</span>
        </button>
      </div>
    </form>

    <!-- Results -->
    <section id="results" class="hidden mt-8">
      <div class="subhead">
        <h2 id="resultsNote">Curated routes</h2>
        <span class="subhead-aside">From the concierge</span>
      </div>
      <div id="cards" class="grid-concierge"></div>
    </section>

    <section id="skeleton" class="hidden mt-8 grid-concierge">
      <article class="rec-card"><div class="skeleton" style="height:18px;width:60%"></div><div class="skeleton mt-3" style="height:11px;width:40%"></div><div class="skeleton mt-5" style="height:60px"></div><div class="skeleton mt-5" style="height:36px"></div></article>
      <article class="rec-card"><div class="skeleton" style="height:18px;width:50%"></div><div class="skeleton mt-3" style="height:11px;width:55%"></div><div class="skeleton mt-5" style="height:60px"></div><div class="skeleton mt-5" style="height:36px"></div></article>
      <article class="rec-card"><div class="skeleton" style="height:18px;width:70%"></div><div class="skeleton mt-3" style="height:11px;width:45%"></div><div class="skeleton mt-5" style="height:60px"></div><div class="skeleton mt-5" style="height:36px"></div></article>
    </section>
  </main>

  <style>
    .grid-concierge {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }
    @media (min-width: 800px) { .grid-concierge { grid-template-columns: repeat(3, 1fr); } }
  </style>

  <script type="module">
    import { supabase } from './js/supabase.js'
    const { esc, toast } = window.bp

    const me = window.__bpUser
    const form   = document.getElementById('conciergeForm')
    const submit = document.getElementById('conSubmit')
    const err    = document.getElementById('conErr')
    const skel   = document.getElementById('skeleton')
    const res    = document.getElementById('results')
    const cards  = document.getElementById('cards')
    const note   = document.getElementById('resultsNote')
    const distIn = document.getElementById('maxDist')
    const distLb = document.getElementById('distLabel')

    const FALLBACK = [
      { title: 'Western Ghats Dawn Run',  distance_km: 180, difficulty: 'Medium', terrain: 'Mountain', description: 'A refined early-morning climb through mist, bends, and old hillside roads.' },
      { title: 'Konkan Coastal Crawl',    distance_km: 240, difficulty: 'Easy',   terrain: 'Highway',  description: 'A measured ride along the western coast — salt air and unhurried towns.' },
      { title: 'Spiti Cold Ascent',       distance_km: 420, difficulty: 'Hard',   terrain: 'Mountain', description: 'A serious high-altitude push through stark valleys and moonlike passes.' },
    ]
    let lastList = []

    distIn.addEventListener('input', () => { distLb.textContent = distIn.value + ' km' })

    const selected = new Set()
    document.querySelectorAll('#terrains .chip').forEach(b => {
      b.addEventListener('click', () => {
        const v = b.getAttribute('data-val')
        if (selected.has(v)) { selected.delete(v); b.classList.remove('is-on') }
        else                 { selected.add(v);    b.classList.add('is-on') }
      })
    })

    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      err.classList.add('hidden')
      const riderLevel = form.querySelector('input[name=riderLevel]:checked')?.value || 'Intermediate'
      const terrains = [...selected]
      const maxDistance = parseInt(distIn.value, 10)
      const region = document.getElementById('region').value.trim() || 'India'
      const mood = document.getElementById('mood').value.trim()

      submit.disabled = true
      submit.innerHTML = '<span class="spinner"></span><span class="btn-label">Consulting the concierge</span>'
      res.classList.add('hidden')
      skel.classList.remove('hidden')
      try {
        const r = await fetch('/api/ai-recommend', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ riderLevel, terrains, maxDistance, region, mood }),
        })
        let data
        try { data = await r.json() } catch { data = null }
        if (!r.ok || !data) throw new Error('Concierge unavailable')
        const recs = (data.recommendations || []).slice(0, 3)
        if (!recs.length) throw new Error('No recommendations returned')
        if (data.fallback) { note.textContent = 'Concierge is paused — showing house recommendations' }
        else               { note.textContent = 'Curated routes' }
        renderCards(recs)
      } catch (e2) {
        skel.classList.add('hidden')
        note.textContent = 'Concierge is paused — showing house recommendations'
        renderCards(FALLBACK)
      } finally {
        submit.disabled = false
        submit.innerHTML = '<span class="btn-label">Consult the concierge</span>'
      }
    })

    function renderCards(list) {
      lastList = list
      res.classList.remove('hidden')
      skel.classList.add('hidden')
      cards.innerHTML = list.map((r, i) => {
        return `<article class="rec-card fade-up" data-idx="${i}">
          <p class="rec-card-title">${esc(r.title)}</p>
          <div class="rec-card-meta">
            <span class="badge badge-brass">${esc(r.difficulty || 'Medium')}</span>
            <span class="dot">·</span>
            <span>${esc(r.terrain || 'Mixed')}</span>
            <span class="dot">·</span>
            <span>${r.distance_km || '—'} km</span>
          </div>
          <div class="rule" style="margin:16px 0"></div>
          <p class="rec-card-desc">${esc(r.description)}</p>
          <div class="rec-card-foot">
            <button data-act="save" class="btn btn-ghost full">Save to my routes</button>
          </div>
        </article>`
      }).join('')
    }

    cards.addEventListener('click', async (e) => {
      const btn = e.target.closest('button[data-act=save]')
      if (!btn) return
      const card = btn.closest('[data-idx]')
      if (!card) return
      const idx = parseInt(card.getAttribute('data-idx'), 10)
      const r = lastList[idx]
      if (!r) return
      btn.disabled = true
      btn.innerHTML = '<span class="spinner"></span><span>Saving</span>'
      const { error } = await supabase.from('trips').insert({
        user_id: me.id,
        title: r.title,
        start_loc: '', end_loc: '',
        distance_km: r.distance_km || null,
        difficulty: r.difficulty || 'Medium',
        notes: r.description || '',
        waypoints: [],
        is_public: false,
      })
      if (error) { toast('Couldn’t save this route.', 'error'); btn.disabled = false; btn.innerHTML = 'Save to my routes'; return }
      toast('Route added to your ledger.', 'success')
      btn.innerHTML = 'Saved'
    })
  </script>
</body>
</html>
