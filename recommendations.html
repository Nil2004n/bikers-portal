<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Road Concierge · Bikers Portal</title>
  <link rel="icon" href="/assets/logo.svg" type="image/svg+xml" />
  <script src="./js/app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./assets/style.css" />
</head>
<body class="min-h-screen bg-ink-900 text-bone font-sans antialiased">

  <script type="module" src="./js/auth-guard.js"></script>

  <header id="bp-navbar" data-active="recommendations"></header>

  <main class="max-w-4xl mx-auto px-4 md:px-6 py-8 md:py-12">
    <div class="text-center mb-8">
      <p class="bp-section-label justify-center">The Concierge</p>
      <h1 class="font-serif text-[28px] md:text-[36px] text-bone mt-2">Road Concierge</h1>
      <p class="text-bone-muted text-[14px] mt-2 max-w-lg mx-auto">Refined route suggestions based on your appetite for distance, terrain, and temperament.</p>
    </div>

    <!-- Form -->
    <form id="conciergeForm" class="bp-card p-5 md:p-7 bp-stitched" novalidate>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <div>
          <label class="bp-label">Rider Level</label>
          <div class="grid grid-cols-3 gap-2" role="radiogroup">
            <label class="bp-radio"><input type="radio" name="riderLevel" value="Beginner" /><span>Beginner</span></label>
            <label class="bp-radio"><input type="radio" name="riderLevel" value="Intermediate" checked /><span>Intermediate</span></label>
            <label class="bp-radio"><input type="radio" name="riderLevel" value="Expert" /><span>Expert</span></label>
          </div>
        </div>
        <div>
          <label class="bp-label">Region / State</label>
          <input id="region" class="bp-input" placeholder="e.g. Karnataka" />
        </div>
      </div>

      <div class="mt-5">
        <label class="bp-label">Terrain Preferences</label>
        <div id="terrains" class="flex flex-wrap gap-2">
          <button type="button" class="bp-chip" data-val="Highway">Highway</button>
          <button type="button" class="bp-chip" data-val="Mountain">Mountain</button>
          <button type="button" class="bp-chip" data-val="City">City</button>
          <button type="button" class="bp-chip" data-val="Dirt">Dirt</button>
          <button type="button" class="bp-chip" data-val="Touring">Touring</button>
          <button type="button" class="bp-chip" data-val="Mixed">Mixed</button>
        </div>
      </div>

      <div class="mt-5">
        <div class="bp-label-row">
          <label class="bp-label" style="margin-bottom:0">Max Distance</label>
          <span id="distLabel" class="text-bone-muted text-[12.5px]">300 km</span>
        </div>
        <input id="maxDist" type="range" min="50" max="1200" step="25" value="300" class="bp-range" />
        <div class="flex justify-between text-bone-dim text-[10.5px] tracking-[0.18em] uppercase mt-1">
          <span>50</span><span>400</span><span>800</span><span>1200</span>
        </div>
      </div>

      <div class="mt-5">
        <label class="bp-label">Mood <span class="text-bone-dim normal-case tracking-normal text-[10.5px]">(optional)</span></label>
        <input id="mood" class="bp-input" placeholder="What kind of ride are you after? calm · spirited · long-haul · scenic · technical" />
      </div>

      <p id="conErr" class="bp-msg bp-msg-error hidden mt-3"></p>

      <div class="flex justify-end mt-6">
        <button id="conSubmit" type="submit" class="bp-btn bp-btn-primary">
          <span class="btn-label">Request Recommendations</span>
        </button>
      </div>
    </form>

    <!-- Results -->
    <section id="results" class="hidden mt-10">
      <p id="resultsNote" class="bp-section-label mb-5">Curated Routes</p>
      <div id="cards" class="grid grid-cols-1 md:grid-cols-3 gap-5"></div>
    </section>

    <section id="skeleton" class="hidden mt-10 grid grid-cols-1 md:grid-cols-3 gap-5">
      <div class="bp-card p-5"><div class="skeleton h-3 w-1/3"></div><div class="skeleton h-3 w-1/2 mt-3"></div><div class="skeleton h-16 mt-4"></div><div class="skeleton h-9 mt-5"></div></div>
      <div class="bp-card p-5"><div class="skeleton h-3 w-1/3"></div><div class="skeleton h-3 w-1/2 mt-3"></div><div class="skeleton h-16 mt-4"></div><div class="skeleton h-9 mt-5"></div></div>
      <div class="bp-card p-5"><div class="skeleton h-3 w-1/3"></div><div class="skeleton h-3 w-1/2 mt-3"></div><div class="skeleton h-16 mt-4"></div><div class="skeleton h-9 mt-5"></div></div>
    </section>
  </main>

  <script type="module">
    import { supabase } from './js/supabase.js'
    const { esc, toast } = window.bp

    const me = window.__bpUser
    const form   = document.getElementById('conciergeForm')
    const submit = document.getElementById('conSubmit')
    const err    = document.getElementById('conErr')
    const skel   = document.getElementById('skeleton')
    const res    = document.getElementById('results')
    const cards  = document.getElementById('cards')
    const note   = document.getElementById('resultsNote')
    const distIn = document.getElementById('maxDist')
    const distLb = document.getElementById('distLabel')

    const FALLBACK = [
      { title: 'Western Ghats Dawn Run',  distance_km: 180, difficulty: 'Medium', terrain: 'Mountain', description: 'A refined early-morning climb through mist, bends, and old hillside roads.' },
      { title: 'Konkan Coastal Crawl',    distance_km: 240, difficulty: 'Easy',   terrain: 'Highway',  description: 'A measured ride along the western coast, salt air, and unhurried towns.' },
      { title: 'Spiti Cold Ascent',       distance_km: 420, difficulty: 'Hard',   terrain: 'Mountain', description: 'A serious high-altitude push through stark valleys and moonlike passes.' },
    ]
    let lastList = []

    distIn.addEventListener('input', () => { distLb.textContent = distIn.value + ' km' })

    // terrain chips
    const selected = new Set()
    document.querySelectorAll('#terrains .bp-chip').forEach(b => {
      b.addEventListener('click', () => {
        const v = b.getAttribute('data-val')
        if (selected.has(v)) { selected.delete(v); b.classList.remove('is-on') }
        else                 { selected.add(v);    b.classList.add('is-on') }
      })
    })

    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      err.classList.add('hidden')
      const riderLevel = form.querySelector('input[name=riderLevel]:checked')?.value || 'Intermediate'
      const terrains = [...selected]
      const maxDistance = parseInt(distIn.value, 10)
      const region = document.getElementById('region').value.trim() || 'India'
      const mood = document.getElementById('mood').value.trim()

      submit.disabled = true
      submit.innerHTML = '<span class="spinner"></span><span class="btn-label">Consulting the concierge</span>'
      res.classList.add('hidden')
      skel.classList.remove('hidden')
      try {
        const r = await fetch('/api/ai-recommend', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ riderLevel, terrains, maxDistance, region, mood }),
        })
        let data
        try { data = await r.json() } catch { data = null }
        if (!r.ok || !data) throw new Error('Concierge unavailable')
        const recs = (data.recommendations || []).slice(0, 3)
        if (!recs.length) throw new Error('No recommendations returned')
        if (data.fallback) { note.textContent = 'Concierge service is temporarily unavailable. Showing house recommendations.' }
        else               { note.textContent = 'Curated Routes' }
        renderCards(recs)
      } catch (e2) {
        skel.classList.add('hidden')
        note.textContent = 'Concierge service is temporarily unavailable. Showing house recommendations.'
        renderCards(FALLBACK)
      } finally {
        submit.disabled = false
        submit.innerHTML = '<span class="btn-label">Request Recommendations</span>'
      }
    })

    function renderCards(list) {
      lastList = list
      res.classList.remove('hidden')
      skel.classList.add('hidden')
      cards.innerHTML = list.map((r, i) => {
        const diff = (r.difficulty || 'Medium').toLowerCase()
        return `<article class="bp-card p-5 flex flex-col" data-idx="${i}">
          <p class="font-serif text-[17px] text-bone leading-tight">${esc(r.title)}</p>
          <div class="mt-2 flex items-center gap-2 flex-wrap">
            <span class="bp-badge bp-badge-${diff}">${esc(r.difficulty || 'Medium')}</span>
            <span class="text-bone-dim text-[11.5px] tracking-[0.16em] uppercase">${esc(r.terrain || 'Mixed')}</span>
            <span class="text-bone-dim text-[11.5px]">·</span>
            <span class="text-bone-muted text-[12px]">${r.distance_km || '—'} km</span>
          </div>
          <div class="bp-divider my-4"></div>
          <p class="text-bone-muted text-[13.5px] leading-relaxed flex-1">${esc(r.description)}</p>
          <button data-act="save" class="bp-btn bp-btn-ghost mt-5 justify-center">Save as Trip</button>
        </article>`
      }).join('')
    }

    cards.addEventListener('click', async (e) => {
      const btn = e.target.closest('button[data-act=save]')
      if (!btn) return
      const card = btn.closest('[data-idx]')
      if (!card) return
      const idx = parseInt(card.getAttribute('data-idx'), 10)
      const r = lastList[idx]
      if (!r) return
      btn.disabled = true
      btn.innerHTML = '<span class="spinner"></span><span>Saving</span>'
      const { error } = await supabase.from('trips').insert({
        user_id: me.id,
        title: r.title,
        start_loc: '', end_loc: '',
        distance_km: r.distance_km || null,
        difficulty: r.difficulty || 'Medium',
        notes: r.description || '',
        waypoints: [],
        is_public: false,
      })
      if (error) { toast('Couldn’t save this route.', 'error'); btn.disabled = false; btn.innerHTML = 'Save as Trip'; return }
      toast('Route added to your ledger.', 'success')
      btn.innerHTML = 'Saved'
    })
  </script>
</body>
</html>
